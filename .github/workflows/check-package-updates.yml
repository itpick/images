name: Check Package Updates

# NOTE: Active package-update detection now lives in
# `.github/workflows/auto-update.yml`, which runs `nix flake update` +
# `nix-update` daily and opens a PR with any bumps (gated on CI via
# auto-merge). This workflow is retained only because `build-containers.yml`
# still calls it as a job; its `workflow_call` interface must stay intact.
# It is a deliberate no-op on the schedule/build path.

on:
  workflow_call:

jobs:
  check-package-updates:
    runs-on: self-hosted
    if: github.event_name == 'schedule'
    steps:
      - name: Superseded by auto-update.yml
        run: |
          echo "Package update detection is handled by auto-update.yml."
          echo "It runs 'nix flake update' + 'nix-update' daily and opens a"
          echo "PR (branch: automated/deps-update) with any bumps, merged"
          echo "automatically once build-containers CI passes."
