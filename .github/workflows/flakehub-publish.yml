name: Publish to FlakeHub

# Publishes this flake to https://flakehub.com/flake/nix-containers/images
#
# Two modes:
#   - Rolling publish on every push to main (always-current pointer)
#   - Versioned publish on git tags matching v*.*.* (immutable releases)
#
# Auth: uses a FlakeHub API token stored as the FLAKEHUB_TOKEN repo
# secret (generated at https://flakehub.com/token/create). We bypass the
# default OIDC flow by pre-authing determinate-nixd with the token —
# the OIDC flow requires GitHub org → FlakeHub linking that we don't
# have set up.

on:
  push:
    branches: [ main ]
    tags: [ "v*.*.*" ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (leave blank for rolling main publish)"
        required: false
        type: string

permissions:
  # id-token: write is required by flakehub-push to get a GitHub-OIDC
  # bearer for the artifact upload — even though FlakeHub auth itself
  # uses the FLAKEHUB_TOKEN below (see the auth step). These are two
  # different uses of "OIDC": the FlakeHub user identity (token), and
  # the GitHub Actions runner identity (id-token).
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Authenticate to FlakeHub via API token
        env:
          FLAKEHUB_TOKEN: ${{ secrets.FLAKEHUB_TOKEN }}
        run: |
          set -euo pipefail
          # ARC runners don't inherit the post-installer PATH that GH-hosted
          # runners do — `determinate-nixd` is installed under the default
          # nix profile but isn't on $PATH for subsequent steps unless we
          # source the profile script (same gotcha deploy-website.yml hits).
          if [ -f /nix/var/nix/profiles/default/etc/profile.d/nix.sh ]; then
            . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
          fi
          if [ -z "${FLAKEHUB_TOKEN:-}" ]; then
            echo "FLAKEHUB_TOKEN secret not set; the publish step will fail." >&2
            exit 1
          fi
          printf '%s' "$FLAKEHUB_TOKEN" \
            | determinate-nixd auth login token --token-file /dev/stdin

      - name: Push to FlakeHub
        # FlakeHub is a non-critical mirror; transient upstream errors (e.g.
        # "504 Gateway Timeout from metadata POST") were failing the whole
        # pipeline for no operational reason. Don't let a mirror hiccup go red.
        continue-on-error: true
        uses: DeterminateSystems/flakehub-push@main
        with:
          # Visibility on flakehub.com. 'public' = anyone can pull;
          # 'unlisted' = only those with the link.
          visibility: "public"
          # Rolling publish: every push to main produces a new release
          # pinned to that commit. Versioned publish: tag-driven.
          rolling: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          # When invoked via workflow_dispatch with a tag input, use it;
          # when triggered by a git tag push, the action picks up the
          # ref automatically.
          tag: ${{ inputs.tag || '' }}
