name: Publish to FlakeHub

# Publishes this flake to https://flakehub.com/flake/nix-containers/images
#
# Two modes:
#   - Rolling publish on every push to main (always-current pointer)
#   - Versioned publish on git tags matching v*.*.* (immutable releases)
#
# One-time setup required at flakehub.com before the first publish:
#   1. Sign in at https://flakehub.com with the GitHub account that owns
#      the nix-containers org.
#   2. Grant FlakeHub access to the nix-containers/images repo.
#   3. The flakehub-push action authenticates via GitHub Actions OIDC
#      (no API token required in this repo's secrets).
#
# Until the one-time setup is done, the workflow will fail with a
# permission error. After setup, no further action needed.

on:
  push:
    branches: [ main ]
    tags: [ "v*.*.*" ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (leave blank for rolling main publish)"
        required: false
        type: string

permissions:
  id-token: write   # required for OIDC auth to flakehub.com
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Push to FlakeHub
        uses: DeterminateSystems/flakehub-push@main
        with:
          # Visibility on flakehub.com. 'public' = anyone can pull;
          # 'unlisted' = only those with the link.
          visibility: "public"
          # Rolling publish: every push to main produces a new release
          # pinned to that commit. Versioned publish: tag-driven.
          rolling: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          # When invoked via workflow_dispatch with a tag input, use it;
          # when triggered by a git tag push, the action picks up the
          # ref automatically.
          tag: ${{ inputs.tag || '' }}
