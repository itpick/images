name: Deploy Website to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'images/*/README.md'
      - 'images/*/default.nix'
      - 'website/**'
      - 'flake.nix'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      # Restore scan-data + tags-data snapshots from the previous
      # successful deploy. The fresh download below is preferred, but
      # if it hits rate-limit (we've burnt the GITHUB_TOKEN quota a few
      # times already), this fallback keeps the site populated rather
      # than rendering with no CVE counts or Tags tab.
      #
      # actions/cache uses a separate quota from the REST API token, so
      # it's available even when 403s hammer gh run list.
      # Each save uses scan-data-snapshot-<run-id> as the key. On
      # restore we want the most-recent prefix match, so we use a
      # `key` that NEVER matches exactly (the current run id won't
      # have a save yet) and let restore-keys do the prefix match.
      # The previous version reused the same string for both fields,
      # which actions/cache@v4 treats as a single key-search and gives
      # up after the (never-existing) exact-match phase. (See deploy
      # run 28475325048 — the cache was present but restore failed.)
      - name: Restore scan-data snapshot (fallback)
        id: cached-scan
        uses: actions/cache/restore@v4
        with:
          path: /tmp/cached-scan-data
          key: scan-data-snapshot-current-${{ github.run_id }}
          restore-keys: |
            scan-data-snapshot-

      - name: Restore tags-data snapshot (fallback)
        id: cached-tags
        uses: actions/cache/restore@v4
        with:
          path: /tmp/cached-tags-data
          key: tags-data-snapshot-current-${{ github.run_id }}
          restore-keys: |
            tags-data-snapshot-

      - name: Download latest non-empty security scan results
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Walk recent COMPLETED runs (success OR failure) until we find
          # one whose artifact actually contains scan files.
          #
          # Why include failures: the aggregate job in security-scan.yml
          # uploads the artifact with `if: always()`, so even when the
          # CVE-issue step throws, the trivy/sbom JSONs land in the
          # artifact. We've lost data this way once already (a failed
          # aggregate step shadowed an otherwise-perfect 189-image
          # artifact). The non-empty-file check below guards against
          # picking up genuinely empty/aborted runs.
          #
          # Retry on rate-limit (HTTP 403 from gh CLI) — when many
          # workflows merge back-to-back the workflow-token's quota
          # gets exhausted, returning empty here and silently blanking
          # the site (#FIX). 5 attempts × increasing backoff.
          RUNS=""
          for attempt in 1 2 3 4 5; do
            RUNS=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow=security-scan.yml \
              --branch=main \
              --status=completed \
              --limit=10 \
              --json databaseId \
              --jq '.[].databaseId' 2>/tmp/runlist.err || true)
            if [ -n "${RUNS:-}" ]; then break; fi
            if grep -qiE 'rate limit|429|403' /tmp/runlist.err 2>/dev/null; then
              echo "gh run list rate-limited (attempt $attempt/5):"
              cat /tmp/runlist.err
              sleep $((attempt * attempt * 10))  # 10s, 40s, 90s, 160s, 250s
            else
              # Real failure or genuinely empty — don't retry forever
              break
            fi
          done
          if [ -z "${RUNS:-}" ]; then
            echo "No successful security-scan.yml run found; vulnerability panels will be omitted."
            echo "path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SCAN_DIR="$RUNNER_TEMP/scan-data"
          for RUN_ID in $RUNS; do
            echo "Trying security-scan.yml run $RUN_ID..."
            rm -rf "$SCAN_DIR"
            mkdir -p "$SCAN_DIR"
            if ! gh run download "$RUN_ID" -n security-scan-results -D "$SCAN_DIR" 2>&1; then
              echo "  download failed; skipping"
              continue
            fi
            COUNT=$(find "$SCAN_DIR" -maxdepth 1 -name '*-trivy.json' 2>/dev/null | wc -l)
            echo "  $COUNT trivy json files"
            if [ "$COUNT" -gt 0 ]; then
              echo "Using run $RUN_ID ($COUNT scanned images)."
              echo "path=$SCAN_DIR" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No recent scan run had a non-empty artifact; vulnerability panels will be omitted."
          echo "path=" >> "$GITHUB_OUTPUT"

      # If fresh download didn't yield anything (rate-limit, artifact
      # expired, etc.), fall back to the cached snapshot from the last
      # good deploy. Better stale data than no data — the site stays
      # populated and the next successful deploy refreshes it.
      - name: Pick scan-data source (fresh or cached)
        id: scan-source
        run: |
          set -euo pipefail
          FRESH='${{ steps.scan.outputs.path }}'
          if [ -n "$FRESH" ] && [ -d "$FRESH" ]; then
            echo "Using fresh scan-data from $FRESH"
            echo "path=$FRESH" >> "$GITHUB_OUTPUT"
            echo "source=fresh" >> "$GITHUB_OUTPUT"
          elif [ -d /tmp/cached-scan-data ] \
               && [ "$(find /tmp/cached-scan-data -maxdepth 1 -name '*-trivy.json' 2>/dev/null | wc -l)" -gt 0 ]; then
            FILES=$(find /tmp/cached-scan-data -maxdepth 1 -name '*-trivy.json' | wc -l)
            echo "Fresh scan-data unavailable; using cached snapshot ($FILES trivy files)"
            echo "path=/tmp/cached-scan-data" >> "$GITHUB_OUTPUT"
            echo "source=cached" >> "$GITHUB_OUTPUT"
          else
            echo "No scan-data (fresh failed AND no cached snapshot)"
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "source=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage scan-data inside the build source tree
        if: steps.scan-source.outputs.path != ''
        run: |
          set -euo pipefail
          # The Nix build's sandbox can't read /home/runner/work/_temp,
          # and every attempt to disable the sandbox in CI has been
          # ignored (#158/#162/#164). The build's source tree IS
          # bind-mounted into the sandbox — so copy the artifact in
          # there and reference it via a relative path.
          #
          # Flakes EXCLUDE untracked files from the source archive, so
          # the copy must be git-added (forced; the dir is gitignored
          # via website/.gitignore). This is a transient CI stage —
          # nothing is committed.
          mkdir -p website/scan-data
          cp -r "${{ steps.scan-source.outputs.path }}/." website/scan-data/
          git config user.email "deploy@nix-containers.local"
          git config user.name "deploy-bot"
          git add -f website/scan-data/
          echo "Staged $(find website/scan-data -name '*-trivy.json' | wc -l) trivy files into website/scan-data/"

      - name: Fetch curated tag list per scanned image
        id: tags
        if: steps.scan-source.outputs.path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Source the image set from the scan-data artifact (= the set of
          # images actually published to GHCR). We can't iterate `images/`
          # — it contains ~3137 entries, only ~200 of which are published,
          # and GHCR 404s would burn rate limit budget.
          mkdir -p website/tags-data
          # filenames are like `ghcr.io_nix-containers_images_<NAME>_latest-trivy.json`
          # so we slice off the prefix/suffix to recover <NAME>.
          IMG_LIST=$(mktemp)
          find website/scan-data -maxdepth 1 -name '*-trivy.json' -printf '%f\n' \
            | sed -E 's/^ghcr\.io_nix-containers_images_([^_]+(_[^_]+)*)_latest-trivy\.json$/\1/' \
            | sort -u > "$IMG_LIST"
          COUNT=$(wc -l < "$IMG_LIST")
          echo "Fetching tags for $COUNT scanned images..."
          fetch_one() {
            local img="$1"
            local encoded="images%2F${img}"
            local tmp="website/tags-data/${img}.json.tmp"
            # `gh api --paginate` writes JSON arrays back-to-back (one per
            # page). `jq -s` reads them as a stream, `[.[][]]` flattens
            # into one array of version records. We then explode each
            # record's tags[], filter out raw 40-char hex SHA tags
            # (build-and-push.yml:163 creates one per push), and sort
            # newest-first.
            #
            # GitHub's secondary rate limit punishes concurrent bursts from
            # the same IP (which we ARE — GHA runners share egress IPs).
            # First-pass result was 143/189 with a single attempt; with
            # 3 retries and exponential backoff (1s, 3s, 9s), drops should
            # be rare.
            local attempt
            for attempt in 1 2 3; do
              if gh api --paginate \
                    "/orgs/nix-containers/packages/container/${encoded}/versions" \
                    2>/dev/null \
                  | jq -s '
                      [ .[][]
                        | . as $v
                        | ($v.metadata.container.tags // [])[]
                        | { tag: ., digest: $v.name, pushed_at: $v.updated_at }
                      ]
                      | map(select(.tag | test("^[0-9a-f]{40}$") | not))
                      | sort_by(.pushed_at) | reverse
                    ' > "$tmp" 2>/dev/null \
                  && [ -s "$tmp" ] \
                  && [ "$(jq 'length' < "$tmp" 2>/dev/null || echo 0)" -gt 0 ]; then
                mv "$tmp" "website/tags-data/${img}.json"
                return
              fi
              rm -f "$tmp"
              if [ "$attempt" -lt 3 ]; then
                sleep $((attempt * attempt))
              fi
            done
            # Final fall-through: log to the summary so we can see what was
            # missed without spamming stdout per success.
            printf '%s\n' "$img" >> "$RUNNER_TEMP/tag-fetch-misses.txt"
          }
          export -f fetch_one
          export GH_TOKEN RUNNER_TEMP
          : > "$RUNNER_TEMP/tag-fetch-misses.txt"
          # 8-way parallelism: drops -P from 16 to reduce secondary-rate-
          # limit pressure (first deployment with -P 16 saw a ~24% drop
          # rate on a single attempt). Combined with retries, total
          # wall-time stays ~2 minutes for ~200 images.
          tr '\n' '\0' < "$IMG_LIST" \
            | xargs -0 -n 1 -P 8 -I {} bash -c 'fetch_one "$@"' _ {}
          WROTE=$(find website/tags-data -name '*.json' | wc -l)
          MISSES=$(wc -l < "$RUNNER_TEMP/tag-fetch-misses.txt")
          echo "Wrote tags-data for $WROTE images. Missed: $MISSES"
          if [ "$MISSES" -gt 0 ]; then
            echo "Missed images (post-retry):"
            sed 's/^/  - /' "$RUNNER_TEMP/tag-fetch-misses.txt"
          fi
          git config user.email "deploy@nix-containers.local"
          git config user.name "deploy-bot"
          git add -f website/tags-data/
          echo "wrote=$WROTE" >> "$GITHUB_OUTPUT"

      # Carry prior-run sizes forward. Sizes are content-addressed by manifest
      # digest, so seeding the freshly-generated tags-data from the restored
      # snapshot means the (budgeted) enricher only sizes NEW digests — coverage
      # accumulates to 100% across runs instead of re-sizing from scratch and
      # losing most of it to the budget (which under-counted the size totals).
      - name: Seed tags-data sizes from previous snapshot
        if: steps.tags.outputs.wrote != '0' && steps.tags.outputs.wrote != ''
        run: |
          set -euo pipefail
          if [ -d /tmp/cached-tags-data ]; then
            python3 website/merge-cached-sizes.py website/tags-data /tmp/cached-tags-data
          else
            echo "No cached tags-data snapshot to seed from."
          fi

      - name: Enrich tags-data with compressed manifest sizes
        if: steps.tags.outputs.wrote != '0' && steps.tags.outputs.wrote != ''
        run: |
          set -euo pipefail
          # GitHub's packages API doesn't include per-version size, so we
          # fetch each manifest from ghcr.io's v2 registry directly.
          # website/enrich-tags-with-size.py uses an anonymous bearer
          # token (public packages allow that). Already-sized tags (seeded
          # above) are skipped, so the budget only covers new digests.
          python3 website/enrich-tags-with-size.py website/tags-data
          # Re-stage so the build picks up the size-enriched JSONs.
          git add -f website/tags-data/

      - name: Look up last successful build-containers run
        id: buildcheck
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Feeds the green-dot freshness check on the index page: a build
          # within the last 7 days is one of the two gates (the other is
          # a scan within 7 days, per-image).
          #
          # Same rate-limit retry pattern as the scan-data step above —
          # this call also gets 403'd under concurrent-workflow load.
          ISO=""
          for attempt in 1 2 3 4 5; do
            ISO=$(gh run list --repo "$GITHUB_REPOSITORY" \
                    --workflow=build-containers.yml --branch=main --status=success \
                    --limit=1 --json createdAt --jq '.[0].createdAt // ""' \
                    2>/tmp/buildcheck.err || true)
            if [ -n "${ISO:-}" ]; then break; fi
            if grep -qiE 'rate limit|429|403' /tmp/buildcheck.err 2>/dev/null; then
              echo "gh run list rate-limited (attempt $attempt/5):"
              cat /tmp/buildcheck.err
              sleep $((attempt * attempt * 10))
            else
              break
            fi
          done
          echo "iso=$ISO" >> "$GITHUB_OUTPUT"
          echo "Last successful build-containers.yml run on main: ${ISO:-<none>}"

      - name: Build static website
        env:
          # Direct path to the downloaded artifact dir (staged into the
          # source tree by the previous step too, but kept as a fallback).
          SCAN_DATA_PATH: ${{ steps.scan-source.outputs.path }}
          # GH Pages project sites publish at /<repo>/, so absolute asset
          # URLs (/static/css/site.css etc.) need that prefix.
          PAGES_BASE_PATH: /${{ github.event.repository.name }}/
          LAST_BUILD_AT: ${{ steps.buildcheck.outputs.iso }}
        run: |
          set -euo pipefail
          . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
          # --impure required to read PAGES_BASE_PATH / SCAN_DATA_PATH /
          # LAST_BUILD_AT via builtins.getEnv in generate-site.nix.
          # SCAN_DATA_PATH now points at a /nix/store/ path (staged in
          # the previous step), which is always visible to the sandbox —
          # supersedes the earlier '--option sandbox false' attempt from
          # #158 (which was silently ignored because the runner is not a
          # trusted user).
          nix build .#website --impure --print-build-logs
          mkdir -p ./website-build
          cp -r ./result/* ./website-build/
        
      # Save the fresh scan-data + tags-data as future-deploy fallbacks.
      # Only saves when this deploy had a real fresh download — caching
      # the cached-snapshot back to itself would be wasted bytes.
      - name: Save scan-data snapshot for future deploys
        if: steps.scan-source.outputs.source == 'fresh'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.scan-source.outputs.path }}
          key: scan-data-snapshot-${{ github.run_id }}

      - name: Save tags-data snapshot for future deploys
        if: steps.scan-source.outputs.source == 'fresh' && steps.tags.outputs.wrote != '0' && steps.tags.outputs.wrote != ''
        uses: actions/cache/save@v4
        with:
          path: website/tags-data
          key: tags-data-snapshot-${{ github.run_id }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './website-build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-website
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5