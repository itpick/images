name: Deploy Website to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'images/*/README.md'
      - 'images/*/default.nix'
      - 'website/**'
      - 'flake.nix'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        run: |
          curl --connect-timeout 30 --max-time 300 -fsSL https://nixos.org/nix/install | sh -s -- --daemon --yes
          . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
          mkdir -p ~/.config/nix
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf
          # Disable sandbox at the daemon level so render.py inside the
          # build can read /home/runner/work/_temp/scan-data (the
          # security-scan-results artifact). #158's client-side
          # `--option sandbox false` was silently ignored on this runner
          # ("warning: ignoring the client-specified setting 'sandbox',
          # because it is a restricted setting and you are not a trusted
          # user"). #160's nix-store --add approach got the artifact
          # into the store, but env-var-passed store paths aren't
          # treated as dependencies → still invisible to the sandbox.
          # Daemon-level setting bypasses all of that.
          echo "sandbox = false" | sudo tee -a /etc/nix/nix.conf
          sudo systemctl restart nix-daemon
          echo "/nix/var/nix/profiles/default/bin" >> $GITHUB_PATH

      - name: Download latest non-empty security scan results
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Walk recent successful runs until we find one whose artifact
          # actually contains scan files. Ad-hoc dispatches that target a
          # not-yet-published image (e.g. "scan only act") produce a
          # zero-file artifact that succeeds — without this loop, the
          # latest such run would shadow the most recent full scan.
          RUNS=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow=security-scan.yml \
            --branch=main \
            --status=success \
            --limit=10 \
            --json databaseId \
            --jq '.[].databaseId' || true)
          if [ -z "${RUNS:-}" ]; then
            echo "No successful security-scan.yml run found; vulnerability panels will be omitted."
            echo "path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SCAN_DIR="$RUNNER_TEMP/scan-data"
          for RUN_ID in $RUNS; do
            echo "Trying security-scan.yml run $RUN_ID..."
            rm -rf "$SCAN_DIR"
            mkdir -p "$SCAN_DIR"
            if ! gh run download "$RUN_ID" -n security-scan-results -D "$SCAN_DIR" 2>&1; then
              echo "  download failed; skipping"
              continue
            fi
            COUNT=$(find "$SCAN_DIR" -maxdepth 1 -name '*-trivy.json' 2>/dev/null | wc -l)
            echo "  $COUNT trivy json files"
            if [ "$COUNT" -gt 0 ]; then
              echo "Using run $RUN_ID ($COUNT scanned images)."
              echo "path=$SCAN_DIR" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No recent scan run had a non-empty artifact; vulnerability panels will be omitted."
          echo "path=" >> "$GITHUB_OUTPUT"

      - name: Look up last successful auto-update run
        id: depcheck
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Used by render.py to mark green-dot freshness on index cards.
          ISO=$(gh run list --repo "$GITHUB_REPOSITORY" \
                  --workflow=auto-update.yml --branch=main --status=success \
                  --limit=1 --json createdAt --jq '.[0].createdAt // ""' || true)
          echo "iso=$ISO" >> "$GITHUB_OUTPUT"
          echo "Last successful auto-update.yml run: ${ISO:-<none>}"

      - name: Build static website
        env:
          # Direct path to the downloaded artifact dir; sandbox=false in
          # the daemon (set during Install Nix) means render.py inside
          # the build can read it.
          SCAN_DATA_PATH: ${{ steps.scan.outputs.path }}
          # GH Pages project sites publish at /<repo>/, so absolute asset
          # URLs (/static/css/site.css etc.) need that prefix.
          PAGES_BASE_PATH: /${{ github.event.repository.name }}/
          LAST_DEP_CHECK_AT: ${{ steps.depcheck.outputs.iso }}
        run: |
          set -euo pipefail
          . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
          # --impure required to read PAGES_BASE_PATH / SCAN_DATA_PATH /
          # LAST_DEP_CHECK_AT via builtins.getEnv in generate-site.nix.
          # SCAN_DATA_PATH now points at a /nix/store/ path (staged in
          # the previous step), which is always visible to the sandbox —
          # supersedes the earlier '--option sandbox false' attempt from
          # #158 (which was silently ignored because the runner is not a
          # trusted user).
          nix build .#website --impure --print-build-logs
          mkdir -p ./website-build
          cp -r ./result/* ./website-build/
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './website-build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-website
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5