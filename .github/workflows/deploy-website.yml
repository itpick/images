name: Deploy Website to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'images/*/README.md'
      - 'images/*/default.nix'
      - 'website/**'
      - 'flake.nix'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        run: |
          curl --connect-timeout 30 --max-time 300 -fsSL https://nixos.org/nix/install | sh -s -- --daemon --yes
          . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
          mkdir -p ~/.config/nix
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf
          echo "/nix/var/nix/profiles/default/bin" >> $GITHUB_PATH

      - name: Download latest security scan results
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RUN_ID=$(gh run list \
            --workflow=security-scan.yml \
            --branch=main \
            --status=success \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId' || true)
          if [ -z "${RUN_ID:-}" ] || [ "${RUN_ID}" = "null" ]; then
            echo "No successful security-scan.yml run found; vulnerability panels will be omitted."
            echo "path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Using security-scan.yml run $RUN_ID"
          SCAN_DIR="$RUNNER_TEMP/scan-data"
          mkdir -p "$SCAN_DIR"
          gh run download "$RUN_ID" -n security-scan-results -D "$SCAN_DIR" || {
            echo "Download failed; vulnerability panels will be omitted."
            echo "path=" >> "$GITHUB_OUTPUT"
            exit 0
          }
          echo "Downloaded $(find "$SCAN_DIR" -maxdepth 1 -name '*-trivy.json' 2>/dev/null | wc -l) trivy json files."
          echo "path=$SCAN_DIR" >> "$GITHUB_OUTPUT"

      - name: Look up last successful auto-update run
        id: depcheck
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Used by render.py to mark green-dot freshness on index cards.
          ISO=$(gh run list --repo "$GITHUB_REPOSITORY" \
                  --workflow=auto-update.yml --branch=main --status=success \
                  --limit=1 --json createdAt --jq '.[0].createdAt // ""' || true)
          echo "iso=$ISO" >> "$GITHUB_OUTPUT"
          echo "Last successful auto-update.yml run: ${ISO:-<none>}"

      - name: Build static website
        env:
          SCAN_DATA_PATH: ${{ steps.scan.outputs.path }}
          # GH Pages project sites publish at /<repo>/, so absolute asset
          # URLs (/static/css/site.css etc.) need that prefix.
          PAGES_BASE_PATH: /${{ github.event.repository.name }}/
          LAST_DEP_CHECK_AT: ${{ steps.depcheck.outputs.iso }}
        run: |
          set -euo pipefail
          . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
          # --impure required to read PAGES_BASE_PATH / SCAN_DATA_PATH /
          # LAST_DEP_CHECK_AT via builtins.getEnv in generate-site.nix.
          nix build .#website --impure --print-build-logs
          mkdir -p ./website-build
          cp -r ./result/* ./website-build/
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './website-build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-website
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5