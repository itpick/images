name: Deploy Website to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'images/*/README.md'
      - 'images/*/default.nix'
      - 'website/**'
      - 'flake.nix'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        run: |
          curl --connect-timeout 30 --max-time 300 -fsSL https://nixos.org/nix/install | sh -s -- --daemon --yes
          . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
          mkdir -p ~/.config/nix
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf
          echo "/nix/var/nix/profiles/default/bin" >> $GITHUB_PATH

      - name: Download latest non-empty security scan results
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Walk recent successful runs until we find one whose artifact
          # actually contains scan files. Ad-hoc dispatches that target a
          # not-yet-published image (e.g. "scan only act") produce a
          # zero-file artifact that succeeds — without this loop, the
          # latest such run would shadow the most recent full scan.
          RUNS=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow=security-scan.yml \
            --branch=main \
            --status=success \
            --limit=10 \
            --json databaseId \
            --jq '.[].databaseId' || true)
          if [ -z "${RUNS:-}" ]; then
            echo "No successful security-scan.yml run found; vulnerability panels will be omitted."
            echo "path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SCAN_DIR="$RUNNER_TEMP/scan-data"
          for RUN_ID in $RUNS; do
            echo "Trying security-scan.yml run $RUN_ID..."
            rm -rf "$SCAN_DIR"
            mkdir -p "$SCAN_DIR"
            if ! gh run download "$RUN_ID" -n security-scan-results -D "$SCAN_DIR" 2>&1; then
              echo "  download failed; skipping"
              continue
            fi
            COUNT=$(find "$SCAN_DIR" -maxdepth 1 -name '*-trivy.json' 2>/dev/null | wc -l)
            echo "  $COUNT trivy json files"
            if [ "$COUNT" -gt 0 ]; then
              echo "Using run $RUN_ID ($COUNT scanned images)."
              echo "path=$SCAN_DIR" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No recent scan run had a non-empty artifact; vulnerability panels will be omitted."
          echo "path=" >> "$GITHUB_OUTPUT"

      - name: Stage scan-data inside the build source tree
        if: steps.scan.outputs.path != ''
        run: |
          set -euo pipefail
          # The Nix build's sandbox can't read /home/runner/work/_temp,
          # and every attempt to disable the sandbox in CI has been
          # ignored (#158/#162/#164). The build's source tree IS
          # bind-mounted into the sandbox — so copy the artifact in
          # there and reference it via a relative path.
          #
          # Flakes EXCLUDE untracked files from the source archive, so
          # the copy must be git-added (forced; the dir is gitignored
          # via website/.gitignore). This is a transient CI stage —
          # nothing is committed.
          mkdir -p website/scan-data
          cp -r "${{ steps.scan.outputs.path }}/." website/scan-data/
          git config user.email "deploy@nix-containers.local"
          git config user.name "deploy-bot"
          git add -f website/scan-data/
          echo "Staged $(find website/scan-data -name '*-trivy.json' | wc -l) trivy files into website/scan-data/"

      - name: Look up last successful build-containers run
        id: buildcheck
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Feeds the green-dot freshness check on the index page: a build
          # within the last 7 days is one of the two gates (the other is
          # a scan within 7 days, per-image).
          ISO=$(gh run list --repo "$GITHUB_REPOSITORY" \
                  --workflow=build-containers.yml --branch=main --status=success \
                  --limit=1 --json createdAt --jq '.[0].createdAt // ""' || true)
          echo "iso=$ISO" >> "$GITHUB_OUTPUT"
          echo "Last successful build-containers.yml run on main: ${ISO:-<none>}"

      - name: Build static website
        env:
          # Direct path to the downloaded artifact dir (staged into the
          # source tree by the previous step too, but kept as a fallback).
          SCAN_DATA_PATH: ${{ steps.scan.outputs.path }}
          # GH Pages project sites publish at /<repo>/, so absolute asset
          # URLs (/static/css/site.css etc.) need that prefix.
          PAGES_BASE_PATH: /${{ github.event.repository.name }}/
          LAST_BUILD_AT: ${{ steps.buildcheck.outputs.iso }}
        run: |
          set -euo pipefail
          . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
          # --impure required to read PAGES_BASE_PATH / SCAN_DATA_PATH /
          # LAST_BUILD_AT via builtins.getEnv in generate-site.nix.
          # SCAN_DATA_PATH now points at a /nix/store/ path (staged in
          # the previous step), which is always visible to the sandbox —
          # supersedes the earlier '--option sandbox false' attempt from
          # #158 (which was silently ignored because the runner is not a
          # trusted user).
          nix build .#website --impure --print-build-logs
          mkdir -p ./website-build
          cp -r ./result/* ./website-build/
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './website-build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-website
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5