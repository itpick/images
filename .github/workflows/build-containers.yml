name: Build and Push Container Images

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Daily build at 2 AM UTC to check for package updates
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  discover-images:
    uses: ./.github/workflows/discover-images.yml

  test-images:
    needs: discover-images
    uses: ./.github/workflows/test-images.yml
    with:
      matrix: ${{ needs.discover-images.outputs.matrix }}

  build-and-push:
    needs: [discover-images, test-images]
    uses: ./.github/workflows/build-and-push.yml
    permissions:
      contents: read
      packages: write
    with:
      matrix: ${{ needs.discover-images.outputs.matrix }}

  check-package-updates:
    uses: ./.github/workflows/check-package-updates.yml

  security-scan:
    needs: build-and-push
    uses: ./.github/workflows/security-scan.yml
