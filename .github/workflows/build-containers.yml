name: Build and Push Container Images

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # schedule:
  #   # Daily build at 2 AM UTC to check for package updates
  #   - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all images regardless of version changes'
        required: false
        default: 'false'
        type: boolean
      images:
        description: 'Comma-separated list of images to build+test (e.g. "postgres,redis,nginx"). Overrides changes detection; ignored when force_rebuild=true.'
        required: false
        default: ''
        type: string

jobs:
  discover-images:
    uses: ./.github/workflows/discover-images.yml

  check-version-changes:
    uses: ./.github/workflows/check-version-changes.yml

  select-matrix:
    # Picks which matrix to feed downstream jobs and whether they should run.
    # Priority: explicit `images` input > force_rebuild > version changes-detected > nothing.
    needs: [discover-images, check-version-changes]
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
      run: ${{ steps.pick.outputs.run }}
    steps:
      - id: pick
        # Values are passed via toJSON to safely embed JSON (e.g. the matrix)
        # into shell assignments — bare interpolation of a JSON object into a
        # YAML env: entry silently drops the variable.
        run: |
          set -euo pipefail
          IMAGES=${{ toJSON(github.event.inputs.images) }}
          FORCE=${{ toJSON(github.event.inputs.force_rebuild) }}
          CHANGES_DETECTED=${{ toJSON(needs.check-version-changes.outputs.changes-detected) }}
          CHANGED=${{ toJSON(needs.check-version-changes.outputs.changed-images) }}
          FULL=${{ toJSON(needs.discover-images.outputs.matrix) }}

          # GHA's toJSON(undefined) yields the literal string "null"; normalize.
          [ "$IMAGES" = "null" ] && IMAGES=""
          [ "$FORCE" = "null" ] && FORCE="false"
          [ "$CHANGES_DETECTED" = "null" ] && CHANGES_DETECTED="false"

          if [ -n "$IMAGES" ]; then
            MATRIX=$(printf '%s' "$FULL" | jq -c --arg list "$IMAGES" '
              ($list | split(",") | map(gsub("^\\s+|\\s+$"; ""))) as $sel
              | {include: [.include[] | select(.name as $n | $sel | index($n))]}
            ')
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Selected images: $IMAGES"
            echo "Matrix: $MATRIX"
          elif [ "$FORCE" = "true" ]; then
            echo "matrix=$FULL" >> "$GITHUB_OUTPUT"
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "force_rebuild=true; using full discovered matrix"
          elif [ "$CHANGES_DETECTED" = "true" ]; then
            echo "matrix=$CHANGED" >> "$GITHUB_OUTPUT"
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Using changed-images matrix from version detection"
          else
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected and no inputs; skipping test/build"
          fi

  test-images:
    needs: [select-matrix]
    if: needs.select-matrix.outputs.run == 'true'
    uses: ./.github/workflows/test-images.yml
    with:
      matrix: ${{ needs.select-matrix.outputs.matrix }}

  build-and-push:
    needs: [select-matrix, test-images]
    if: needs.select-matrix.outputs.run == 'true'
    uses: ./.github/workflows/build-and-push.yml
    permissions:
      contents: read
      packages: write
    with:
      matrix: ${{ needs.select-matrix.outputs.matrix }}

  check-package-updates:
    uses: ./.github/workflows/check-package-updates.yml

  save-versions:
    needs: [build-and-push, check-version-changes]
    if: needs.check-version-changes.outputs.changes-detected == 'true' || github.event.inputs.force_rebuild == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        run: |
          curl --connect-timeout 30 --max-time 300 -fsSL https://nixos.org/nix/install | sh -s -- --daemon --yes
          . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
          mkdir -p ~/.config/nix
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf

      - name: Generate and commit package versions
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
          
          echo "📋 Generating current package versions..."
          
          # Use the built-in version checker
          nix --extra-experimental-features "nix-command flakes" run .#check-versions | sed 's/🔍 Checking package versions...//' | jq . > package-versions.json
          
          # Commit the versions file
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package-versions.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update package versions after successful build" \
            git push
          fi

  security-scan:
    needs: [build-and-push, select-matrix]
    if: needs.build-and-push.result == 'success'
    uses: ./.github/workflows/security-scan.yml
    permissions:
      contents: read
      packages: read
      security-events: write
    with:
      # security-scan expects a JSON ARRAY of image entries; select-matrix's
      # `matrix` output is `{"include":[...]}` (the matrix shape). Unwrap to
      # the array.
      images: ${{ toJSON(fromJSON(needs.select-matrix.outputs.matrix).include) }}
