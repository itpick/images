name: Build and Push Container Images

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Daily safety-net build at 02:23 UTC (off the :00 cron stampede). No-ops
    # when nothing changed: check-version-changes gates the build matrix.
    - cron: '23 2 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all images regardless of version changes'
        required: false
        default: 'false'
        type: boolean
      images:
        description: 'Comma-separated list of images to build+test (e.g. "postgres,redis,nginx"). Overrides changes detection; ignored when force_rebuild=true.'
        required: false
        default: ''
        type: string

jobs:
  discover-images:
    uses: ./.github/workflows/discover-images.yml

  check-version-changes:
    uses: ./.github/workflows/check-version-changes.yml

  detect-file-changes:
    needs: [discover-images]
    uses: ./.github/workflows/detect-file-changes.yml
    with:
      full-matrix: ${{ needs.discover-images.outputs.matrix }}

  select-matrix:
    # Picks which matrix to feed downstream jobs and whether they should run.
    # Priority: explicit `images` input > force_rebuild >
    # (file-changed ∪ version-changed) > nothing.
    needs: [discover-images, check-version-changes, detect-file-changes]
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
      run: ${{ steps.pick.outputs.run }}
    steps:
      - id: pick
        # Values are passed via toJSON to safely embed JSON (e.g. the matrix)
        # into shell assignments — bare interpolation of a JSON object into a
        # YAML env: entry silently drops the variable.
        run: |
          set -euo pipefail
          IMAGES=${{ toJSON(github.event.inputs.images) }}
          FORCE=${{ toJSON(github.event.inputs.force_rebuild) }}
          VERSION_CHANGED=${{ toJSON(needs.check-version-changes.outputs.changes-detected) }}
          VERSION_MATRIX=${{ toJSON(needs.check-version-changes.outputs.changed-images) }}
          FILE_CHANGED=${{ toJSON(needs.detect-file-changes.outputs.changes-detected) }}
          FILE_MATRIX=${{ toJSON(needs.detect-file-changes.outputs.changed-images) }}
          FILE_REBUILD_ALL=${{ toJSON(needs.detect-file-changes.outputs.rebuild-all) }}
          FULL=${{ toJSON(needs.discover-images.outputs.matrix) }}

          # GHA's toJSON(undefined) yields the literal string "null"; normalize.
          [ "$IMAGES" = "null" ] && IMAGES=""
          [ "$FORCE" = "null" ] && FORCE="false"
          [ "$VERSION_CHANGED" = "null" ] && VERSION_CHANGED="false"
          [ "$FILE_CHANGED" = "null" ] && FILE_CHANGED="false"
          [ "$FILE_REBUILD_ALL" = "null" ] && FILE_REBUILD_ALL="false"
          [ "$VERSION_MATRIX" = "null" ] && VERSION_MATRIX='{"include":[]}'
          [ "$FILE_MATRIX" = "null" ] && FILE_MATRIX='{"include":[]}'

          if [ -n "$IMAGES" ]; then
            MATRIX=$(printf '%s' "$FULL" | jq -c --arg list "$IMAGES" '
              ($list | split(",") | map(gsub("^\\s+|\\s+$"; ""))) as $sel
              | {include: [.include[] | select(.name as $n | $sel | index($n))]}
            ')
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Selected images: $IMAGES"
            echo "Matrix: $MATRIX"
          elif [ "$FORCE" = "true" ] || [ "$FILE_REBUILD_ALL" = "true" ]; then
            # FORCE: explicit user request. FILE_REBUILD_ALL: detect-file-changes
            # signalled a shared-path change (lib/, flake.lock, etc.) where any
            # one image change can't be precisely attributed, so a full rebuild
            # is the safe default.
            #
            # Hard cap: GitHub Actions imposes a 256-job limit per matrix, AND
            # any downstream `workflow_call` that exposes `inputs.matrix` as an
            # env var hits Linux's MAX_ARG_STRLEN (~128KB) when the matrix JSON
            # is large. With 3000+ images in this repo the full matrix is both
            # ~425KB and ~12x the matrix-job ceiling, so passing $FULL downstream
            # detonates `execve: Argument list too long` and skips the chain
            # silently. Force a graceful skip + a step summary explaining the
            # operator's options (targeted workflow_dispatch with `images=`).
            FULL_COUNT=$(printf '%s' "$FULL" | jq -r '.include | length // 0')
            if [ "$FULL_COUNT" -gt 256 ]; then
              echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
              echo "run=false" >> "$GITHUB_OUTPUT"
              {
                echo "## select-matrix: rebuild-all skipped"
                echo ""
                echo "Discovered matrix has **${FULL_COUNT}** images, which exceeds GitHub Actions' 256-job matrix limit."
                echo ""
                if [ "$FORCE" = "true" ]; then
                  echo "Trigger source: \`workflow_dispatch\` with \`force_rebuild=true\`."
                else
                  echo "Trigger source: shared-path file change (e.g. \`flake.nix\`, \`flake.lock\`, \`lib/**\`)."
                fi
                echo ""
                echo "To rebuild specific images, re-run \`workflow_dispatch\` with the \`images\` input set to a CSV of names, e.g.:"
                echo ""
                echo '```'
                echo "gh workflow run build-containers.yml --ref main -f images=imageA,imageB,imageC"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              echo "matrix has $FULL_COUNT images (>256); skipping downstream chain — see workflow summary for next steps"
            else
              echo "matrix=$FULL" >> "$GITHUB_OUTPUT"
              echo "run=true" >> "$GITHUB_OUTPUT"
              if [ "$FORCE" = "true" ]; then
                echo "force_rebuild=true; using full discovered matrix ($FULL_COUNT images)"
              else
                echo "file-change rebuild-all triggered; using full discovered matrix ($FULL_COUNT images)"
              fi
            fi
          elif [ "$VERSION_CHANGED" = "true" ] || [ "$FILE_CHANGED" = "true" ]; then
            # Union the two matrices on .name. check-version-changes emits the
            # matrix as a bare array (e.g. "[]" when empty), while
            # detect-file-changes emits it as {"include":[...]} — normalize
            # both shapes before concat.
            MATRIX=$(jq -cn \
              --argjson v "$VERSION_MATRIX" \
              --argjson f "$FILE_MATRIX" '
              def to_array:
                if type == "object" and has("include") then .include
                elif type == "array" then .
                else [] end;
              {include: (($v | to_array) + ($f | to_array) | unique_by(.name))}
            ')
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Using union of version-changed and file-changed matrices"
            echo "Matrix: $MATRIX"
          else
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected and no inputs; skipping test/build"
          fi

  test-images:
    needs: [select-matrix]
    if: needs.select-matrix.outputs.run == 'true'
    uses: ./.github/workflows/test-images.yml
    with:
      matrix: ${{ needs.select-matrix.outputs.matrix }}

  # Kind-cluster smoke test. Runs in parallel with test-images (docker-run
  # smoke). Deliberately NOT a dependency of build-and-push for now — we want
  # visibility into per-image kind behavior before making it a publish gate.
  # Promote to a gate (add to build-and-push.needs) once trusted.
  test-images-kind:
    needs: [select-matrix]
    if: needs.select-matrix.outputs.run == 'true'
    uses: ./.github/workflows/test-images-kind.yml
    with:
      matrix: ${{ needs.select-matrix.outputs.matrix }}

  # Helm-chart smoke test. Like test-images-kind, runs in parallel with
  # test-images, deliberately NOT a publish gate yet. Promote to a gate
  # by adding to build-and-push.needs once stable.
  test-images-charts:
    needs: [select-matrix]
    if: needs.select-matrix.outputs.run == 'true'
    uses: ./.github/workflows/test-images-charts.yml
    with:
      matrix: ${{ needs.select-matrix.outputs.matrix }}

  build-and-push:
    needs: [select-matrix, test-images]
    if: needs.select-matrix.outputs.run == 'true'
    uses: ./.github/workflows/build-and-push.yml
    permissions:
      contents: read
      packages: write
    with:
      matrix: ${{ needs.select-matrix.outputs.matrix }}

  check-package-updates:
    uses: ./.github/workflows/check-package-updates.yml

  save-versions:
    needs: [build-and-push, check-version-changes]
    if: needs.check-version-changes.outputs.changes-detected == 'true' || github.event.inputs.force_rebuild == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        run: |
          curl --connect-timeout 30 --max-time 300 -fsSL https://nixos.org/nix/install | sh -s -- --daemon --yes
          . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
          mkdir -p ~/.config/nix
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf

      - name: Generate and commit package versions
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
          
          echo "📋 Generating current package versions..."
          
          # Use the built-in version checker
          nix --extra-experimental-features "nix-command flakes" run .#check-versions | sed 's/🔍 Checking package versions...//' | jq . > package-versions.json
          
          # Commit the versions file
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package-versions.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update package versions after successful build" \
            git push
          fi

  security-scan:
    needs: [build-and-push, select-matrix]
    if: needs.build-and-push.result == 'success'
    uses: ./.github/workflows/security-scan.yml
    permissions:
      contents: read
      packages: read
      security-events: write
      # security-scan.yml opens/updates a rolling CVE-alert issue
      # (PR #135). Reusable workflows can only USE permissions the
      # CALLER grants. Without this, GitHub fails workflow validation
      # at load time → startup_failure on the whole build-containers
      # run (no jobs created, no visible error).
      issues: write
    with:
      # security-scan expects a JSON ARRAY of image entries; select-matrix's
      # `matrix` output is `{"include":[...]}` (the matrix shape). Unwrap to
      # the array.
      images: ${{ toJSON(fromJSON(needs.select-matrix.outputs.matrix).include) }}
