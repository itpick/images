name: Test Images on Kind

# Smoke-test each image on a kind (Kubernetes-in-Docker) cluster: build → load
# into kind → deploy as a Pod → wait for Running (or Completed for one-shot
# images) → fail on CrashLoopBackOff. Soft signal that the image survives
# pod-lifecycle scheduling, not a full integration test.
#
# Known categorical limitations of this 0-config smoke test (CLI tools that
# exit on no args, servers that need config files, images that need cluster
# wiring, UID/permissions mismatches) are documented in
# tests/kind-tests/KNOWN-LIMITATIONS.md. A failure for one of those reasons
# is expected and means "this image needs a richer test", not "this image is
# broken."
#
# Designed to be callable from `build-containers.yml` after the matrix builds,
# AND triggerable on demand via workflow_dispatch with a comma-separated
# `images` input for targeted testing.

on:
  workflow_call:
    inputs:
      matrix:
        description: "Matrix of images to test (same shape as test-images.yml: {include: [{name: ...}, ...]})"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      images:
        description: 'Comma-separated list of images to kind-test (e.g. "redis,postgres,nginx")'
        required: true
        type: string

permissions:
  contents: read

jobs:
  # Pick the matrix from whichever input the caller used. We don't condition
  # on github.event_name because when chained via workflow_call, the called
  # workflow inherits the parent's event_name (e.g. "push"), not
  # "workflow_call" — so we can't reliably distinguish triggers that way.
  # Instead we check whether the typed workflow_call input `matrix` is set
  # (non-empty when called via workflow_call) and otherwise build one from
  # the workflow_dispatch `images` CSV input.
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        env:
          CALLER_MATRIX: ${{ inputs.matrix }}
          DISPATCH_IMAGES: ${{ inputs.images }}
        run: |
          set -euo pipefail
          if [ -n "${CALLER_MATRIX:-}" ]; then
            echo "Using workflow_call matrix"
            echo "matrix=${CALLER_MATRIX}" >> "$GITHUB_OUTPUT"
          else
            echo "Building matrix from workflow_dispatch images CSV"
            MATRIX=$(printf '%s' "${DISPATCH_IMAGES:-}" | jq -Rc '
              split(",")
              | map(gsub("^\\s+|\\s+$"; ""))
              | map(select(length > 0))
              | {include: map({name: .})}
            ')
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          fi

  kind-test:
    needs: [resolve-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJSON(needs.resolve-matrix.outputs.matrix) }}
    env:
      KIND_VERSION: v0.30.0
      IMAGE_TAG: kind-test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Install kind
        run: |
          set -euo pipefail
          sudo curl -sSLo /usr/local/bin/kind \
            "https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64"
          sudo chmod +x /usr/local/bin/kind
          kind version

      - name: Build image
        id: build
        run: |
          set -euo pipefail
          nix build .#${{ matrix.name }} --print-build-logs
          echo "built=true" >> "$GITHUB_OUTPUT"

      - name: Load image into Docker
        id: load
        run: |
          set -euo pipefail
          nix run .#${{ matrix.name }}.copyTo -- \
            docker-daemon:${{ matrix.name }}:${{ env.IMAGE_TAG }}
          docker images | grep ${{ matrix.name }} | head -1
          echo "loaded=true" >> "$GITHUB_OUTPUT"

      - name: Create kind cluster
        run: |
          set -euo pipefail
          # Single-node cluster is enough for smoke tests; saves ~30s vs the
          # full ingress-ready config used in tests/kind-tests/configs.
          kind create cluster \
            --name=kind-e2e-${{ matrix.name }} \
            --wait=120s
          kubectl cluster-info

      - name: Load image into kind
        run: |
          set -euo pipefail
          kind load docker-image ${{ matrix.name }}:${{ env.IMAGE_TAG }} \
            --name=kind-e2e-${{ matrix.name }}

      - name: Deploy image as Pod
        id: deploy
        run: |
          set -euo pipefail
          # Two deploy modes:
          #
          # 1. Smoketest mode — used when `images/<name>/smoketest.sh` exists.
          #    The script is bundled into a ConfigMap and run as the Pod's
          #    command via `/bin/bash`. Pass requires `exit 0` (the script
          #    uses `set -euo pipefail` per convention). Catches regressions
          #    the default mode can't: wrong tool variants (Python yq vs Go
          #    yq), binaries-not-on-PATH, broken option flags, etc.
          #
          # 2. Default mode — generic Pod with the image's default
          #    entrypoint+cmd. Verifies the image can load and schedule;
          #    reaching Running (server) or Succeeded (one-shot) counts.
          #    Categorical limits documented in KNOWN-LIMITATIONS.md.
          SMOKETEST="images/${{ matrix.name }}/smoketest.sh"
          HELPERS="tests/kind-tests/smoketest-helpers.sh"
          if [ -f "$SMOKETEST" ]; then
            echo "mode=smoketest" >> "$GITHUB_OUTPUT"
            # Bundle both the per-image script AND the shared helpers
            # library; smoketest.sh sources `/smoketest/helpers.sh`.
            kubectl create configmap "e2e-${{ matrix.name }}-script" \
              --from-file=smoketest.sh="$SMOKETEST" \
              --from-file=helpers.sh="$HELPERS"
            cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: e2e-${{ matrix.name }}
            namespace: default
            labels:
              app: e2e-${{ matrix.name }}
          spec:
            restartPolicy: Never
            containers:
              - name: app
                image: ${{ matrix.name }}:${{ env.IMAGE_TAG }}
                imagePullPolicy: Never
                # Invoke the script directly so each smoketest's shebang
                # picks its own interpreter — slim images can use
                # `#!/bin/sh` (busybox), richer ones (kubectl-dev) can
                # opt into bash. The ConfigMap mount defaults to 0755
                # below so the entry is executable.
                command: ["/smoketest/smoketest.sh"]
                volumeMounts:
                  - name: script
                    mountPath: /smoketest
                    readOnly: true
            volumes:
              - name: script
                configMap:
                  name: e2e-${{ matrix.name }}-script
                  defaultMode: 0755
          EOF
          else
            echo "mode=default" >> "$GITHUB_OUTPUT"
            cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: e2e-${{ matrix.name }}
            namespace: default
            labels:
              app: e2e-${{ matrix.name }}
          spec:
            restartPolicy: Never
            containers:
              - name: app
                image: ${{ matrix.name }}:${{ env.IMAGE_TAG }}
                imagePullPolicy: Never
          EOF
          fi

      - name: Wait for pod success
        id: wait
        env:
          MODE: ${{ steps.deploy.outputs.mode }}
        run: |
          set -uo pipefail
          POD=e2e-${{ matrix.name }}
          # Smoketest mode runs a real script, allow more time.
          if [ "$MODE" = "smoketest" ]; then DEADLINE=$(( $(date +%s) + 180 )); else DEADLINE=$(( $(date +%s) + 90 )); fi
          PASS=""
          REASON=""
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            PHASE=$(kubectl get pod "$POD" -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            REASON=$(kubectl get pod "$POD" -o jsonpath='{.status.containerStatuses[0].state.waiting.reason}' 2>/dev/null || echo "")
            case "$PHASE/$REASON" in
              # Default mode: a Pod that stays Running is a pass (long-lived
              # servers). Smoketest mode: Running is intermediate — the
              # script hasn't exited yet, keep polling for Succeeded/Failed.
              Running/)
                if [ "$MODE" = "smoketest" ]; then : ; else PASS=running; break; fi
                ;;
              Succeeded/) PASS=succeeded; break ;;
              Failed/*|*/CrashLoopBackOff|*/ErrImagePull|*/ImagePullBackOff|*/CreateContainerConfigError|*/Error)
                PASS=fail; break ;;
            esac
            sleep 3
          done
          echo "pod_phase=$PHASE" >> "$GITHUB_OUTPUT"
          echo "pod_reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "result=${PASS:-timeout}" >> "$GITHUB_OUTPUT"
          if [ "$PASS" = "running" ] || [ "$PASS" = "succeeded" ]; then
            echo "PASS: ${{ matrix.name }} ($MODE) → $PASS"
            exit 0
          fi
          echo "FAIL: ${{ matrix.name }} ($MODE) → phase=$PHASE reason=$REASON"
          exit 1

      - name: Pod details on failure
        if: failure()
        run: |
          kubectl describe pod e2e-${{ matrix.name }} || true
          kubectl logs e2e-${{ matrix.name }} --tail=200 --all-containers=true || true

      - name: Upload pod logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kind-e2e-${{ matrix.name }}-logs
          path: |
            /tmp/kind-e2e-${{ matrix.name }}.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Test Summary
        if: always()
        run: |
          echo "=== Kind E2E Summary for ${{ matrix.name }} ==="
          echo "Build: ${{ steps.build.outputs.built || 'skipped' }}"
          echo "Load: ${{ steps.load.outputs.loaded || 'skipped' }}"
          echo "Pod phase: ${{ steps.wait.outputs.pod_phase || 'n/a' }}"
          echo "Pod reason: ${{ steps.wait.outputs.pod_reason || 'n/a' }}"
          echo "Result: ${{ steps.wait.outputs.result || 'n/a' }}"

      - name: Tear down kind cluster
        if: always()
        run: |
          kind delete cluster --name=kind-e2e-${{ matrix.name }} 2>/dev/null || true
