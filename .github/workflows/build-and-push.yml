name: Build and Push Images

on:
  workflow_call:
    inputs:
      matrix:
        description: "Matrix of images to build"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        run: |
          # Install Nix with retry logic
          for i in {1..3}; do
            echo "Attempt $i: Installing Nix..."
            if curl --connect-timeout 30 --max-time 300 -fsSL https://nixos.org/nix/install | sh -s -- --daemon --yes; then
              echo "Nix installation successful"
              break
            else
              echo "Nix installation failed on attempt $i"
              if [ $i -eq 3 ]; then
                echo "All attempts failed, but continuing workflow"
                exit 0  # Don't fail the entire workflow
              fi
              sleep 10
            fi
          done
          
          # Setup Nix if installation succeeded
          if [ -f /nix/var/nix/profiles/default/etc/profile.d/nix.sh ]; then
            . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
            mkdir -p ~/.config/nix
            echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf
            echo "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}" >> ~/.config/nix/nix.conf
            echo "/nix/var/nix/profiles/default/bin" >> $GITHUB_PATH
            echo "NIX_INSTALLED=true" >> $GITHUB_ENV
          else
            echo "NIX_INSTALLED=false" >> $GITHUB_ENV
          fi

      - name: Setup Docker
        run: |
          # Docker is already available on Ubuntu runners, just start the daemon if needed
          sudo systemctl start docker

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build nix2container image
        if: env.NIX_INSTALLED == 'true'
        run: |
          # Source Nix environment
          . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
          # Build image using Nix flakes with explicit experimental features
          nix --extra-experimental-features "nix-command flakes" build .#${{ matrix.name }} --print-build-logs
          echo "BUILD_SUCCESS=true" >> $GITHUB_ENV

      - name: Load and push image to registry
        if: env.NIX_INSTALLED == 'true' && env.BUILD_SUCCESS == 'true'
        run: |
          # Load the nix2container image and push directly to registry
          if [ -f ./result ]; then
            echo "Loading nix2container image..."
            # Check what nix2container actually created
            ls -la ./result* || true
            
            # The result is a JSON file, we need to load it using Docker
            echo "Reading nix2container JSON manifest..."
            cat ./result | head -20
            
            # Use nix2container's copyTo function or load the JSON directly
            # Source Nix environment first
            . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
            
            # Load using nix2container copyTo function
            echo "Loading image using nix2container..."
            nix --extra-experimental-features "nix-command flakes" run .#${{ matrix.name }}.copyTo -- docker-daemon:${{ matrix.name }}:latest
            
            # Get the loaded image details
            echo "=== Available Docker images ==="
            docker images
            
            # Find the most recently created image (should be ours)
            IMAGE_ID=$(docker images --format "{{.ID}}" | head -1)
            if [ -z "$IMAGE_ID" ]; then
              echo "Error: No image found after loading"
              exit 1
            fi
            echo "Found image ID: $IMAGE_ID"
            
            # Generate the target registry URL
            REGISTRY_URL="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.name }}"
            
            # Extract package version for version tagging.
            #
            # Resolution order:
            #   1. `.config.Labels."org.opencontainers.image.version"` — what
            #      images built via `lib/mkImage.nix` expose. Tells us the
            #      upstream version (e.g. `8.0.5`), independent of registry tag.
            #   2. `.imageTag` — the tag the derivation itself declares (e.g.
            #      `v1.36.1-dev` for kubectl-dev). nix2container outputs from
            #      hand-written `default.nix` don't expose `.config` as a
            #      direct attribute, so the eval in (1) silently fails for
            #      them; without this fallback, the tag never gets pushed.
            #   3. `latest` — last resort, suppresses the version-tag push.
            echo "Extracting package version..."
            . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
            nix_eval() {
              nix --extra-experimental-features "nix-command flakes" eval --raw "$@" 2>/dev/null
            }
            PACKAGE_VERSION=$(nix_eval ".#${{ matrix.name }}.config.Labels.\"org.opencontainers.image.version\"" \
              || nix_eval ".#${{ matrix.name }}.imageTag" \
              || echo "latest")
            echo "Package version: $PACKAGE_VERSION"
            
            # Calculate compressed size and add as label
            echo "Calculating compressed image size..."
            COMPRESSED_SIZE=$(docker save "${{ matrix.name }}:latest" | gzip | wc -c)
            echo "Compressed size: $COMPRESSED_SIZE bytes"
            
            # Create new image with size label
            echo "FROM ${{ matrix.name }}:latest" > Dockerfile.temp
            echo "LABEL org.opencontainers.image.size=\"$COMPRESSED_SIZE\"" >> Dockerfile.temp
            docker build -t "${{ matrix.name }}:temp" -f Dockerfile.temp .
            rm Dockerfile.temp
            
            # Replace the original image
            docker tag "${{ matrix.name }}:temp" "${{ matrix.name }}:latest"
            docker rmi "${{ matrix.name }}:temp"
            IMAGE_ID=$(docker images "${{ matrix.name }}:latest" --format "{{.ID}}")
            
            # Docker tags can't contain '/'; sanitize the branch name (e.g. feat/foo -> feat-foo).
            REF_TAG="${{ github.ref_name }}"
            REF_TAG="${REF_TAG//\//-}"

            # Tag with different versions
            docker tag "$IMAGE_ID" "${REGISTRY_URL}:latest"
            docker tag "$IMAGE_ID" "${REGISTRY_URL}:${{ github.sha }}"
            if [ "$PACKAGE_VERSION" != "latest" ]; then
              docker tag "$IMAGE_ID" "${REGISTRY_URL}:$PACKAGE_VERSION"
            fi
            if [ "${{ github.ref_name }}" != "main" ]; then
              docker tag "$IMAGE_ID" "${REGISTRY_URL}:$REF_TAG"
            fi

            # Push all tags
            echo "Pushing to registry..."
            docker push "${REGISTRY_URL}:latest"
            docker push "${REGISTRY_URL}:${{ github.sha }}"
            if [ "$PACKAGE_VERSION" != "latest" ]; then
              docker push "${REGISTRY_URL}:$PACKAGE_VERSION"
            fi
            if [ "${{ github.ref_name }}" != "main" ]; then
              docker push "${REGISTRY_URL}:$REF_TAG"
            fi

            # Registry-side tag presence check. The version-tag push has
            # silently failed in the past (e.g. when PACKAGE_VERSION
            # resolution fell back to "latest"), leaving the registry
            # without the :v<ver> tag callers reference. Operators only
            # noticed when downstream pods went ImagePullBackOff hours
            # later. Verify each tag we just attempted to push actually
            # resolves on the registry before declaring success.
            echo "Verifying tags on registry..."
            verify_tag() {
              local ref=$1
              if ! docker manifest inspect "$ref" >/dev/null 2>&1; then
                echo "❌ Registry verify FAILED: $ref is not resolvable" >&2
                return 1
              fi
              echo "  ✓ $ref"
            }
            verify_tag "${REGISTRY_URL}:latest"
            verify_tag "${REGISTRY_URL}:${{ github.sha }}"
            if [ "$PACKAGE_VERSION" != "latest" ]; then
              verify_tag "${REGISTRY_URL}:$PACKAGE_VERSION"
            fi
            if [ "${{ github.ref_name }}" != "main" ]; then
              verify_tag "${REGISTRY_URL}:$REF_TAG"
            fi

            echo "✅ Successfully pushed ${{ matrix.name }} to registry"
          else
            echo "Error: Could not find nix2container result file"
            exit 1
          fi

      - name: Build Summary
        if: always()
        run: |
          echo "=== Build Summary for ${{ matrix.name }} ==="
          if [ "$NIX_INSTALLED" = "true" ]; then
            echo "✅ Nix installation: SUCCESS"
          else
            echo "❌ Nix installation: FAILED"
          fi
          
          if [ "$BUILD_SUCCESS" = "true" ]; then
            echo "✅ Container build: SUCCESS"
          elif [ "$NIX_INSTALLED" = "true" ]; then
            echo "❌ Container build: FAILED"
          else
            echo "⏭️ Container build: SKIPPED (Nix not available)"
          fi