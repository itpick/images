name: Security Scan

on:
  workflow_call:
    inputs:
      images:
        description: "JSON array of images to scan"
        required: false
        type: string
        default: '[]'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install security tools
        run: |
          echo "🔧 Installing security scanning tools..."
          
          # Install Trivy
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          
          # Install Grype
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          
          # Install Syft for SBOM generation
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          
          echo "✅ Security tools installed"
          trivy version
          grype version
          syft version

      - name: Setup Docker for local testing
        run: |
          # Docker is already available, just ensure it's running
          sudo systemctl start docker
          
          # Add current user to docker group for act compatibility
          sudo usermod -aG docker $USER || true

      - name: Scan container images with Trivy
        run: |
          echo "🔍 Starting Trivy security scans..."
          
          # Get images to scan - either from input or discover all built images
          IMAGES_TO_SCAN='${{ inputs.images }}'
          if [ "$IMAGES_TO_SCAN" = "[]" ] || [ -z "$IMAGES_TO_SCAN" ]; then
            echo "📋 No specific images provided, scanning available Docker images..."
            # Look for our repository images in Docker
            AVAILABLE_IMAGES=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "ghcr.io/${{ github.repository }}" | head -5 || echo "")
            if [ -z "$AVAILABLE_IMAGES" ]; then
              echo "⚠️  No built images found to scan"
              echo "This is expected if running locally or if no images were built"
              exit 0
            fi
            IMAGES_TO_SCAN=$(echo "$AVAILABLE_IMAGES" | jq -R . | jq -s .)
          fi
          
          echo "📋 Images to scan: $IMAGES_TO_SCAN"
          
          # Create scan results directory
          mkdir -p scan-results
          
          # Scan each image
          echo "$IMAGES_TO_SCAN" | jq -r '.[]' | while read -r image; do
            if [ -n "$image" ]; then
              echo "🔍 Scanning $image with Trivy..."
              
              # Run Trivy scan with multiple output formats
              trivy image \
                --exit-code 0 \
                --severity HIGH,CRITICAL \
                --format table \
                "$image" | tee "scan-results/${image//\//_}-trivy.txt"
              
              # Generate JSON report for programmatic analysis
              trivy image \
                --exit-code 0 \
                --format json \
                --output "scan-results/${image//\//_}-trivy.json" \
                "$image"
              
              # Generate SARIF for GitHub Security tab
              trivy image \
                --exit-code 0 \
                --format sarif \
                --output "scan-results/${image//\//_}-trivy.sarif" \
                "$image"
              
              echo "✅ Trivy scan completed for $image"
            fi
          done

      - name: Scan with Grype for additional coverage
        continue-on-error: true
        run: |
          echo "🔍 Running Grype vulnerability scans..."
          
          IMAGES_TO_SCAN='${{ inputs.images }}'
          if [ "$IMAGES_TO_SCAN" = "[]" ] || [ -z "$IMAGES_TO_SCAN" ]; then
            AVAILABLE_IMAGES=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "ghcr.io/${{ github.repository }}" | head -3 || echo "")
            if [ -z "$AVAILABLE_IMAGES" ]; then
              echo "⚠️  No images available for Grype scanning"
              exit 0
            fi
            IMAGES_TO_SCAN=$(echo "$AVAILABLE_IMAGES" | jq -R . | jq -s .)
          fi
          
          echo "$IMAGES_TO_SCAN" | jq -r '.[]' | while read -r image; do
            if [ -n "$image" ]; then
              echo "🔍 Scanning $image with Grype..."
              grype "$image" -o table | tee "scan-results/${image//\//_}-grype.txt" || true
              grype "$image" -o json > "scan-results/${image//\//_}-grype.json" || true
              echo "✅ Grype scan completed for $image"
            fi
          done

      - name: Generate SBOM with Syft
        continue-on-error: true
        run: |
          echo "📋 Generating Software Bill of Materials (SBOM)..."
          
          IMAGES_TO_SCAN='${{ inputs.images }}'
          if [ "$IMAGES_TO_SCAN" = "[]" ] || [ -z "$IMAGES_TO_SCAN" ]; then
            AVAILABLE_IMAGES=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "ghcr.io/${{ github.repository }}" | head -3 || echo "")
            if [ -z "$AVAILABLE_IMAGES" ]; then
              echo "⚠️  No images available for SBOM generation"
              exit 0
            fi
            IMAGES_TO_SCAN=$(echo "$AVAILABLE_IMAGES" | jq -R . | jq -s .)
          fi
          
          echo "$IMAGES_TO_SCAN" | jq -r '.[]' | while read -r image; do
            if [ -n "$image" ]; then
              echo "📋 Generating SBOM for $image..."
              syft "$image" -o json > "scan-results/${image//\//_}-sbom.json" || true
              syft "$image" -o spdx-json > "scan-results/${image//\//_}-sbom-spdx.json" || true
              echo "✅ SBOM generated for $image"
            fi
          done

      - name: Analyze scan results
        run: |
          echo "📊 Analyzing security scan results..."
          
          if [ ! -d scan-results ]; then
            echo "⚠️  No scan results directory found"
            exit 0
          fi
          
          # Count vulnerabilities by severity
          CRITICAL_COUNT=0
          HIGH_COUNT=0
          TOTAL_SCANS=0
          
          for json_file in scan-results/*-trivy.json; do
            if [ -f "$json_file" ]; then
              TOTAL_SCANS=$((TOTAL_SCANS + 1))
              
              # Count vulnerabilities by severity
              CRITICAL_IN_FILE=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' "$json_file" 2>/dev/null || echo "0")
              HIGH_IN_FILE=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' "$json_file" 2>/dev/null || echo "0")
              
              CRITICAL_COUNT=$((CRITICAL_COUNT + CRITICAL_IN_FILE))
              HIGH_COUNT=$((HIGH_COUNT + HIGH_IN_FILE))
              
              echo "📊 $(basename "$json_file"): $CRITICAL_IN_FILE critical, $HIGH_IN_FILE high"
            fi
          done
          
          echo "========================================"
          echo "📊 Security Scan Summary"
          echo "  Total images scanned: $TOTAL_SCANS"
          echo "  Critical vulnerabilities: $CRITICAL_COUNT"
          echo "  High vulnerabilities: $HIGH_COUNT"
          
          # Set outputs for other jobs
          echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          echo "high_count=$HIGH_COUNT" >> $GITHUB_OUTPUT
          echo "total_scans=$TOTAL_SCANS" >> $GITHUB_OUTPUT
          
          # Optional: Fail on critical vulnerabilities (disabled for now)
          # if [ $CRITICAL_COUNT -gt 0 ]; then
          #   echo "❌ Critical vulnerabilities found, failing build"
          #   exit 1
          # fi

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: scan-results/
          retention-days: 30

      - name: Upload SARIF results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: scan-results/
          category: trivy-container-scan