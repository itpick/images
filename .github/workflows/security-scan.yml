name: Security Scan

# Three trigger modes:
#   - workflow_call: invoked by build-containers.yml after build-and-push;
#     receives the matrix of just-built images.
#   - schedule (daily): scan every image we publish to ghcr that the
#     existence-filter can reach. Produces the security-scan-results
#     artifact that deploy-website consumes.
#   - workflow_dispatch: same as schedule with an optional override list
#     and tunable shard count.
#
# Architecture (since the matrix-shard refactor):
#   1. resolve-images — resolves the candidate list (workflow_call /
#      dispatch CSV / schedule = full images/*/ enumeration), runs
#      `docker manifest inspect` in parallel to drop names that aren't
#      published, splits the survivors into N roughly-equal shards.
#   2. scan (matrix) — one job per shard. Installs Trivy + Grype + Syft
#      and scans its slice. Uploads scan-results-shard-<N> artifact.
#   3. aggregate — downloads all shard artifacts into a single
#      scan-results/ dir, runs the per-image CVE counts, opens or
#      closes the rolling CVE-alert issue, uploads the final
#      security-scan-results artifact (same name as before so
#      deploy-website.yml keeps working).

on:
  workflow_call:
    inputs:
      images:
        description: "JSON array of images to scan"
        required: false
        type: string
        default: '[]'
  schedule:
    # Daily at 06:00 UTC. Off-peak; not on the :00 minute is fine here
    # because the scan grows with image count and we don't want hour-
    # boundary contention with the auto-update cron.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      images:
        description: 'Optional CSV of image names (e.g. "redis,postgres,vault"). Empty = full repo (existence-filtered).'
        required: false
        default: ''
        type: string
      shards:
        description: "Number of parallel scan jobs (max-parallel = this value, capped at 20 by GH free tier)."
        required: false
        default: '20'
        type: string
      critical_threshold:
        description: "Open an issue if total critical CVEs >= this value."
        required: false
        default: '1'
        type: string
      high_threshold:
        description: "Open an issue if total high CVEs >= this value."
        required: false
        default: '10'
        type: string

permissions:
  contents: read
  packages: read

jobs:
  resolve-images:
    runs-on: self-hosted
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}
      has-work: ${{ steps.split.outputs.has-work }}
      total: ${{ steps.split.outputs.total }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve, existence-filter, and shard the image list
        id: split
        env:
          IMAGES_INPUT: ${{ inputs.images }}
          SHARDS_INPUT: ${{ inputs.shards || '' }}
          EVENT: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # ---- step 1: build the candidate list ----
          CANDIDATES_JSON="[]"
          if [ -n "${IMAGES_INPUT:-}" ] && [ "$IMAGES_INPUT" != "[]" ] && \
             echo "$IMAGES_INPUT" | jq -e 'type == "array"' >/dev/null 2>&1; then
            # workflow_call JSON-array path: matrix-include objects.
            CANDIDATES_JSON=$(echo "$IMAGES_INPUT" | jq -c \
              --arg repo "$REPO" --arg sha "$SHA" \
              '[ .[] | if type == "object" then "ghcr.io/\($repo)/\(.name):\($sha)" else . end ]')
          elif [ -n "${IMAGES_INPUT:-}" ] && [ "$IMAGES_INPUT" != "[]" ]; then
            # workflow_dispatch CSV path.
            CANDIDATES_JSON=$(printf '%s' "$IMAGES_INPUT" | jq -Rc \
              --arg repo "$REPO" \
              'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))
               | map("ghcr.io/\($repo)/\(.):latest")')
          else
            # schedule / dispatch-with-no-input: enumerate every image dir
            # under images/ that has a default.nix. The existence filter
            # below drops the ~60% that aren't published yet.
            echo "📋 No input; enumerating images/*/default.nix"
            CANDIDATES_JSON=$(find images -mindepth 2 -maxdepth 2 -name default.nix -printf '%h\n' \
              | sed 's|^images/||' \
              | grep -vE '\.(md|txt|json|yaml|yml|lock|html|sh)$' \
              | sort -u \
              | jq -Rc --arg repo "$REPO" '"ghcr.io/\($repo)/\(.):latest"' \
              | jq -cs '.')
          fi
          TOTAL_CANDIDATES=$(echo "$CANDIDATES_JSON" | jq 'length')
          echo "Total candidates: $TOTAL_CANDIDATES"

          # ---- step 2: existence-filter in parallel (xargs -P 32) ----
          # docker manifest inspect is HEAD-like; cheap. Parallelize to keep
          # the resolve step under a minute even for 3000 candidates.
          if [ "$TOTAL_CANDIDATES" -eq 0 ]; then
            EXISTING_JSON="[]"
          else
            echo "$CANDIDATES_JSON" | jq -r '.[]' > /tmp/candidates.txt
            xargs -a /tmp/candidates.txt -I {} -P 32 sh -c '
              if docker manifest inspect "$1" >/dev/null 2>&1; then echo "$1"; fi
            ' _ {} > /tmp/existing.txt
            EXISTING_JSON=$(jq -Rc '.' /tmp/existing.txt | jq -cs '.')
          fi
          TOTAL_EXISTING=$(echo "$EXISTING_JSON" | jq 'length')
          TOTAL_SKIPPED=$((TOTAL_CANDIDATES - TOTAL_EXISTING))
          echo "After existence filter: $TOTAL_EXISTING scannable ($TOTAL_SKIPPED not yet published)"

          # ---- step 3: shard ----
          if [ "$TOTAL_EXISTING" -eq 0 ]; then
            echo "has-work=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo "total=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Default to 20 shards (GH free tier max-parallel limit for
          # ubuntu-latest on public repos). Never more shards than images.
          SHARDS="${SHARDS_INPUT:-20}"
          SHARDS=$(( SHARDS < TOTAL_EXISTING ? SHARDS : TOTAL_EXISTING ))
          echo "Splitting $TOTAL_EXISTING images across $SHARDS shards"

          # Chunk into roughly-equal slices via jq. The iteration index is
          # captured into `$i` so the inner `$all | .[…]` slice doesn't
          # shadow `.` with the whole array (which made `(. * $sz)` evaluate
          # as "array * number" and aborted resolve-images in #172).
          MATRIX=$(echo "$EXISTING_JSON" | jq -c \
            --argjson shards "$SHARDS" \
            '
              . as $all
              | length as $n
              | (($n + $shards - 1) / $shards | floor) as $sz
              | [range(0; $shards) as $i | {
                  shard: ($i + 1),
                  images: $all[($i * $sz):(($i + 1) * $sz)]
                }]
              | map(select(.images | length > 0))
              | {include: .}
            ')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "has-work=true" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL_EXISTING" >> "$GITHUB_OUTPUT"
          echo "Resolved matrix:"
          echo "$MATRIX" | jq '.include | map({shard, count: (.images | length)})'

  scan:
    needs: resolve-images
    if: needs.resolve-images.outputs.has-work == 'true'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJSON(needs.resolve-images.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Trivy + Grype + Syft
        run: |
          set -euo pipefail
          # Trivy via apt
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add - 2>/dev/null
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq trivy
          # Grype + Syft via official installers
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin >/dev/null
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin >/dev/null
          trivy --version | head -1
          grype version | head -1
          syft version | head -1

      - name: Scan shard ${{ matrix.shard }}
        run: |
          set -euo pipefail
          mkdir -p scan-results
          IMAGES_JSON=$(jq -nc --argjson xs '${{ toJSON(matrix.images) }}' '$xs')
          COUNT=$(echo "$IMAGES_JSON" | jq 'length')
          echo "Shard ${{ matrix.shard }}: scanning $COUNT images"
          echo "$IMAGES_JSON" | jq -r '.[]' | while read -r image; do
            [ -z "$image" ] && continue
            safe="${image//[\/:]/_}"
            echo "=== $image ==="
            trivy image --exit-code 0 --severity HIGH,CRITICAL --format table  "$image" 2>&1 | tee "scan-results/${safe}-trivy.txt"    || echo "skip: trivy table   $image"
            trivy image --exit-code 0 --format json  --output "scan-results/${safe}-trivy.json"  "$image"                                  || echo "skip: trivy json    $image"
            trivy image --exit-code 0 --format sarif --output "scan-results/${safe}-trivy.sarif" "$image"                                  || echo "skip: trivy sarif   $image"
            grype "$image" -o table              | tee "scan-results/${safe}-grype.txt" || true
            grype "$image" -o json   > "scan-results/${safe}-grype.json"               || true
            syft  "$image" -o json   > "scan-results/${safe}-sbom.json"                || true
            syft  "$image" -o spdx-json > "scan-results/${safe}-sbom-spdx.json"        || true
          done
          echo "Shard ${{ matrix.shard }} produced $(ls scan-results/*-trivy.json 2>/dev/null | wc -l) trivy + $(ls scan-results/*-sbom.json 2>/dev/null | wc -l) sbom files."

      - name: Upload shard artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-results-shard-${{ matrix.shard }}
          path: scan-results/
          retention-days: 30

  aggregate:
    needs: [resolve-images, scan]
    if: ${{ always() && needs.resolve-images.outputs.has-work == 'true' }}
    runs-on: self-hosted
    permissions:
      contents: read
      packages: read
      security-events: write
      issues: write   # for the CVE-threshold alert step
    env:
      CRITICAL_THRESHOLD: ${{ inputs.critical_threshold || '1' }}
      HIGH_THRESHOLD: ${{ inputs.high_threshold || '10' }}
    steps:
      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: scan-results-shard-*
          path: scan-results
          merge-multiple: true

      - name: Inventory
        run: |
          echo "Aggregated scan results:"
          echo "  trivy json: $(ls scan-results/*-trivy.json 2>/dev/null | wc -l)"
          echo "  sbom json:  $(ls scan-results/*-sbom.json  2>/dev/null | wc -l)"
          echo "  grype json: $(ls scan-results/*-grype.json 2>/dev/null | wc -l)"

      - name: Analyze scan results
        id: analyze
        run: |
          set -euo pipefail
          CRITICAL_COUNT=0
          HIGH_COUNT=0
          TOTAL_SCANS=0
          : > scan-results/_per-image.jsonl
          for json_file in scan-results/*-trivy.json; do
            [ -f "$json_file" ] || continue
            TOTAL_SCANS=$((TOTAL_SCANS + 1))
            IMG=$(basename "$json_file" -trivy.json)
            CRITICAL_IN_FILE=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' "$json_file" 2>/dev/null || echo "0")
            HIGH_IN_FILE=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' "$json_file" 2>/dev/null || echo "0")
            CRITICAL_COUNT=$((CRITICAL_COUNT + CRITICAL_IN_FILE))
            HIGH_COUNT=$((HIGH_COUNT + HIGH_IN_FILE))
            jq -nc --arg img "$IMG" --argjson c "$CRITICAL_IN_FILE" --argjson h "$HIGH_IN_FILE" \
              '{image: $img, critical: $c, high: $h}' >> scan-results/_per-image.jsonl
          done
          echo "Total images scanned: $TOTAL_SCANS"
          echo "Total critical: $CRITICAL_COUNT"
          echo "Total high: $HIGH_COUNT"
          {
            echo "critical_count=$CRITICAL_COUNT"
            echo "high_count=$HIGH_COUNT"
            echo "total_scans=$TOTAL_SCANS"
          } >> "$GITHUB_OUTPUT"

      - name: Open or update CVE alert issue
        if: >-
          (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
          && (
            fromJSON(steps.analyze.outputs.critical_count || '0') >= fromJSON(env.CRITICAL_THRESHOLD)
            || fromJSON(steps.analyze.outputs.high_count || '0') >= fromJSON(env.HIGH_THRESHOLD)
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CRITICAL: ${{ steps.analyze.outputs.critical_count }}
          HIGH: ${{ steps.analyze.outputs.high_count }}
          TOTAL: ${{ steps.analyze.outputs.total_scans }}
        run: |
          set -euo pipefail
          TOP=$(jq -s 'sort_by(-.critical, -.high) | .[0:10]' scan-results/_per-image.jsonl)
          {
            echo "## Security scan alert"
            echo ""
            echo "Latest scheduled scan found:"
            echo "- **$CRITICAL critical** CVEs (alert threshold: ${CRITICAL_THRESHOLD})"
            echo "- **$HIGH high** CVEs (alert threshold: ${HIGH_THRESHOLD})"
            echo ""
            echo "across $TOTAL images."
            echo ""
            echo "### Top 10 offenders"
            echo ""
            echo "| Image | Critical | High |"
            echo "|---|---:|---:|"
            echo "$TOP" | jq -r '.[] | "| \(.image) | \(.critical) | \(.high) |"'
            echo ""
            echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo ""
            echo "---"
            echo "_Auto-updated by \`.github/workflows/security-scan.yml\`._"
            echo "_Last update: $(date -u +%Y-%m-%dT%H:%M:%SZ)_"
          } > issue-body.md
          # --repo lets gh work without an `actions/checkout` (the aggregate
          # job doesn't check the repo out — it only operates on artifacts).
          # Without --repo, gh tries `git config` in the cwd and fails with
          # "fatal: not a git repository", killing the step before the
          # downstream upload-artifact runs.
          TITLE="Security scan: $CRITICAL critical / $HIGH high CVEs across $TOTAL images"
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" \
                       --label security:scan-alert --state open \
                       --json number --jq '.[0].number // ""')
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" --body-file issue-body.md
          else
            gh label create security:scan-alert --repo "$GITHUB_REPOSITORY" \
              --color FF0000 \
              --description "Auto-generated by security-scan workflow when CVE thresholds are exceeded" \
              2>/dev/null || true
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" --body-file issue-body.md \
              --label security:scan-alert
          fi

      - name: Close stale alert issue when thresholds are no longer exceeded
        if: >-
          (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
          && fromJSON(steps.analyze.outputs.critical_count || '0') < fromJSON(env.CRITICAL_THRESHOLD)
          && fromJSON(steps.analyze.outputs.high_count || '0') < fromJSON(env.HIGH_THRESHOLD)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" \
                       --label security:scan-alert --state open \
                       --json number --jq '.[0].number // ""')
          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --repo "$GITHUB_REPOSITORY" \
              -c "All CVE counts are now below the alert thresholds. Closing automatically; will reopen on next breach."
          fi

      - name: Upload aggregated artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          # Single artifact name the deploy-website workflow has always
          # consumed — keeps that wiring unchanged.
          name: security-scan-results
          path: scan-results/
          retention-days: 30
