
# Global parameters

global:
  imageRegistry: ""
  imagePullSecrets: []
  defaultStorageClass: ""
  storageClass: ""
  security:
    allowInsecureImages: false
  compatibility:
    openshift:
      adaptSecurityContext: auto
# RabbitMQ Image parameters
image:
  registry: ghcr.io
  repository: nix-containers/rabbitmq-nixchart
  tag: 4.1.3-debian-12-r1
  digest: ""
  debug: false
  pullPolicy: IfNotPresent
  pullSecrets: []
# Common parameters

nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""
kubeVersion: ""
clusterDomain: cluster.local
extraDeploy: []
commonAnnotations: {}
servicenameOverride: ""
commonLabels: {}
serviceBindings:
  enabled: false
enableServiceLinks: true
usePasswordFiles: true
diagnosticMode:
  enabled: false
  command:
    - sleep
  args:
    - infinity
automountServiceAccountToken: true
hostAliases: []
dnsPolicy: ""
dnsConfig: {}
auth:
  username: user
  password: ""
  securePassword: true
  updatePassword: false
  existingPasswordSecret: ""
  existingSecretPasswordKey: ""
  enableLoopbackUser: false
  erlangCookie: ""
  existingErlangSecret: ""
  existingSecretErlangKey: ""
  tls:
    enabled: false
    autoGenerated: false
    failIfNoPeerCert: true
    sslOptionsVerify: verify_peer
    sslOptionsPassword:
      enabled: false
      existingSecret: ""
      key: ""
      password: ""
    caCertificate: ""
    serverCertificate: ""
    serverKey: ""
    existingSecret: ""
    existingSecretFullChain: false
    overrideCaCertificate: ""
logs: "-"
ulimitNofiles: "65535"
maxAvailableSchedulers: ""
onlineSchedulers: ""
memoryHighWatermark:
  enabled: false
  type: "relative"
  value: 0.4
plugins: "rabbitmq_management rabbitmq_peer_discovery_k8s"

queue_leader_locator: balanced
queue_master_locator: ""

communityPlugins: ""
extraPlugins: "rabbitmq_auth_backend_ldap"
clustering:
  enabled: true
  name: ""
  addressType: hostname
  rebalance: false
  forceBoot: false
  partitionHandling: autoheal
loadDefinition:
  enabled: false
  file: "/app/load_definition.json"
  existingSecret: ""
command: []
args: []
lifecycleHooks: {}
terminationGracePeriodSeconds: 120
extraEnvVars: []
extraEnvVarsCM: ""
extraEnvVarsSecret: ""
containerPorts:
  amqp: 5672
  amqpTls: 5671
  dist: 25672
  manager: 15672
  epmd: 4369
  metrics: 9419
hostPorts:
  amqp: ""
  amqpTls: ""
  manager: ""
  metrics: ""

initScripts: {}
initScriptsCM: ""
initScriptsSecret: ""
extraContainerPorts: []

tcpListenOptions:
  enabled: true
  backlog: 128
  nodelay: true
  linger:
    lingerOn: true
    timeout: 0
  keepalive: false
configuration: |-
  default_user = {{ .Values.auth.username }}
  {{- if and (not .Values.auth.securePassword) .Values.auth.password }}
  default_pass = {{ .Values.auth.password }}
  {{- end }}
  {{- if .Values.clustering.enabled }}
  cluster_name = {{ default (include "common.names.fullname" .) .Values.clustering.name }}
  cluster_formation.peer_discovery_backend  = rabbit_peer_discovery_k8s
  cluster_formation.k8s.host = kubernetes.default
  cluster_formation.k8s.address_type = {{ .Values.clustering.addressType }}
  {{- $svcName := printf "%s-%s" (include "common.names.fullname" .) (default "headless" .Values.servicenameOverride) }}
  cluster_formation.k8s.service_name = {{ $svcName }}
  cluster_formation.k8s.hostname_suffix = .{{ $svcName }}.{{ include "common.names.namespace" . }}.svc.{{ .Values.clusterDomain }}
  cluster_formation.node_cleanup.interval = 10
  cluster_formation.node_cleanup.only_log_warning = true
  cluster_partition_handling = {{ .Values.clustering.partitionHandling }}
  {{- end }}
  {{ if and .Values.clustering.enabled .Values.loadDefinition.enabled }}
  cluster_formation.target_cluster_size_hint = {{ .Values.replicaCount }}
  {{ end }}
  {{- if .Values.loadDefinition.enabled }}
  load_definitions = {{ .Values.loadDefinition.file }}
  {{- end }}
  # queue leader locator
  queue_leader_locator = {{ include "rabbitmq.queueLocator" . }}
  # enable loopback user
  {{- if not (empty .Values.auth.username) }}
  {{- $sanitizedUsername := regexQuoteMeta .Values.auth.username }}
  loopback_users.{{ $sanitizedUsername }} = {{ .Values.auth.enableLoopbackUser }}
  {{- else}}
  loopback_users.guest = {{ .Values.auth.enableLoopbackUser }}
  {{- end }}
  {{ template "rabbitmq.extraConfiguration" . }}
  {{- if .Values.auth.tls.enabled }}
  ssl_options.verify = {{ .Values.auth.tls.sslOptionsVerify }}
  listeners.ssl.default = {{ .Values.service.ports.amqpTls }}
  ssl_options.fail_if_no_peer_cert = {{ .Values.auth.tls.failIfNoPeerCert }}
  ssl_options.cacertfile = /opt/nix-containers/rabbitmq/certs/ca_certificate.pem
  ssl_options.certfile = /opt/nix-containers/rabbitmq/certs/server_certificate.pem
  ssl_options.keyfile = /opt/nix-containers/rabbitmq/certs/server_key.pem
  {{- if .Values.auth.tls.sslOptionsPassword.enabled }}
  ssl_options.password = {{ include "common.secrets.passwords.manage" (dict "secret" .Values.auth.tls.sslOptionsPassword.existingSecret "key" .Values.auth.tls.sslOptionsPassword.key "providedValues" (list "auth.tls.sslOptionsPassword.password") "skipB64enc" true "failOnNew" false "context" $) }}
  {{- end }}
  {{- end }}
  {{- if .Values.ldap.enabled }}
  auth_backends.1.authn = ldap
  auth_backends.1.authz = {{ ternary "ldap" "internal" .Values.ldap.authorisationEnabled }}
  auth_backends.2 = internal
  {{- $host :=  list }}
  {{- $port :=  ternary 636 389 .Values.ldap.tls.enabled }}
  {{- if .Values.ldap.uri }}
  {{- $hostPort := get (urlParse .Values.ldap.uri) "host" }}
  {{- $host = list (index (splitList ":" $hostPort) 0) -}}
  {{- if (contains ":" $hostPort) }}
  {{- $port = index (splitList ":" $hostPort) 1 -}}
  {{- end }}
  {{- end }}
  {{- range $index, $server := concat $host .Values.ldap.servers }}
  auth_ldap.servers.{{ add $index 1 }} = {{ $server }}
  {{- end }}
  auth_ldap.port = {{ coalesce .Values.ldap.port $port }}
  {{- if or .Values.ldap.user_dn_pattern .Values.ldap.userDnPattern }}
  auth_ldap.user_dn_pattern = {{ coalesce .Values.ldap.user_dn_pattern .Values.ldap.userDnPattern }}
  {{- end }}
  {{- if .Values.ldap.basedn }}
  auth_ldap.dn_lookup_base = {{ .Values.ldap.basedn }}
  {{- end }}
  {{- if .Values.ldap.uidField }}
  auth_ldap.dn_lookup_attribute = {{ .Values.ldap.uidField }}
  {{- end }}
  {{- if .Values.ldap.binddn }}
  auth_ldap.dn_lookup_bind.user_dn = {{ .Values.ldap.binddn }}
  auth_ldap.dn_lookup_bind.password = {{ required "'ldap.bindpw' is required when 'ldap.binddn' is defined" .Values.ldap.bindpw }}
  {{- end }}
  {{- if .Values.ldap.tls.enabled }}
  auth_ldap.use_ssl = {{ not .Values.ldap.tls.startTls }}
  auth_ldap.use_starttls = {{ .Values.ldap.tls.startTls }}
  {{- if .Values.ldap.tls.CAFilename }}
  auth_ldap.ssl_options.cacertfile = {{ .Values.ldap.tls.certificatesMountPath }}/{{ .Values.ldap.tls.CAFilename }}
  {{- end }}
  {{- if .Values.ldap.tls.certFilename }}
  auth_ldap.ssl_options.certfile = {{ .Values.ldap.tls.certificatesMountPath }}/{{ .Values.ldap.tls.certFilename }}
  auth_ldap.ssl_options.keyfile = {{ .Values.ldap.tls.certificatesMountPath }}/{{ required "'ldap.tls.certKeyFilename' is required when 'ldap.tls.certFilename' is defined" .Values.ldap.tls.certKeyFilename }}
  {{- end }}
  {{- if .Values.ldap.tls.skipVerify }}
  auth_ldap.ssl_options.verify = verify_none
  auth_ldap.ssl_options.fail_if_no_peer_cert = false
  {{- else if .Values.ldap.tls.verify }}
  auth_ldap.ssl_options.verify = {{ .Values.ldap.tls.verify }}
  {{- end }}
  {{- end }}
  {{- end }}
  prometheus.tcp.port = {{ .Values.containerPorts.metrics }}
  {{- if .Values.memoryHighWatermark.enabled }}
  {{- if (dig "limits" "memory" "" .Values.resources) }}
  total_memory_available_override_value = {{ include "rabbitmq.toBytes" (dig "limits" "memory" "" .Values.resources) }}
  {{- end }}
  {{- if (eq .Values.memoryHighWatermark.type "absolute") }}
  vm_memory_high_watermark.{{ .Values.memoryHighWatermark.type }} = {{ include "rabbitmq.toBytes" .Values.memoryHighWatermark.value }}
  {{- else if (eq .Values.memoryHighWatermark.type "relative") }}
  vm_memory_high_watermark.{{ .Values.memoryHighWatermark.type }} = {{ .Values.memoryHighWatermark.value }}
  {{- end }}
  {{- end }}
  {{- if .Values.tcpListenOptions.enabled }}
  tcp_listen_options.backlog = {{ .Values.tcpListenOptions.backlog }}
  tcp_listen_options.nodelay = {{ .Values.tcpListenOptions.nodelay }}
  tcp_listen_options.linger.on      = {{ .Values.tcpListenOptions.linger.lingerOn }}
  tcp_listen_options.linger.timeout = {{ .Values.tcpListenOptions.linger.timeout }}
  tcp_listen_options.keepalive = {{ .Values.tcpListenOptions.keepalive }}
  {{- end }}
configurationExistingSecret: ""
extraConfiguration: |-
  #default_vhost = {{ .Release.Namespace }}-vhost
  #disk_free_limit.absolute = 50MB
extraConfigurationExistingSecret: ""
#
advancedConfiguration: ""
advancedConfigurationExistingSecret: ""
featureFlags: ""
ldap:
  enabled: false
  uri: ""
  servers: []
  port: ""
  userDnPattern: ""
  binddn: ""
  bindpw: ""
  basedn: ""
  uidField: ""
  authorisationEnabled: false
  tls:
    enabled: false
    startTls: false
    skipVerify: false
    verify: "verify_peer"
    certificatesMountPath: /opt/nix-containers/rabbitmq/ldap/certs
    certificatesSecret: ""
    CAFilename: ""
    certFilename: ""
    certKeyFilename: ""
extraVolumeMounts: []
extraVolumes: []
extraSecrets: {}
extraSecretsPrependReleaseName: false
# Statefulset parameters

replicaCount: 1
schedulerName: ""
podManagementPolicy: OrderedReady
podLabels: {}
podAnnotations: {}
updateStrategy:
  type: RollingUpdate
statefulsetLabels: {}
statefulsetAnnotations: {}
priorityClassName: ""
podAffinityPreset: ""
podAntiAffinityPreset: soft
nodeAffinityPreset:
  type: ""
  key: ""
  values: []
affinity: {}
nodeSelector: {}
tolerations: []
topologySpreadConstraints: []
podSecurityContext:
  enabled: true
  fsGroupChangePolicy: Always
  sysctls: []
  supplementalGroups: []
  fsGroup: 1001
containerSecurityContext:
  enabled: true
  seLinuxOptions: {}
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: "RuntimeDefault"
resourcesPreset: "micro"
resources: {}
livenessProbe:
  enabled: true
  initialDelaySeconds: 120
  timeoutSeconds: 20
  periodSeconds: 30
  failureThreshold: 6
  successThreshold: 1
readinessProbe:
  enabled: true
  initialDelaySeconds: 10
  timeoutSeconds: 20
  periodSeconds: 30
  failureThreshold: 3
  successThreshold: 1
startupProbe:
  enabled: false
  initialDelaySeconds: 10
  timeoutSeconds: 20
  periodSeconds: 30
  failureThreshold: 3
  successThreshold: 1
customLivenessProbe: {}
customReadinessProbe: {}
customStartupProbe: {}
initContainers: []
sidecars: []
pdb:
  create: true
  minAvailable: ""
  maxUnavailable: ""
# RBAC parameters

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false
  annotations: {}
rbac:
  create: true
  rules: []
# Persistence parameters
persistence:
  enabled: true
  storageClass: ""
  selector: {}
  accessModes:
    - ReadWriteOnce
  existingClaim: ""
  mountPath: /opt/nix-containers/rabbitmq/.rabbitmq/mnesia
  subPath: ""
  size: 8Gi
  annotations: {}
  labels: {}
persistentVolumeClaimRetentionPolicy:
  enabled: false
  whenScaled: Retain
  whenDeleted: Retain
# Exposure parameters

service:
  type: ClusterIP
  portEnabled: true
  distPortEnabled: true
  managerPortEnabled: true
  epmdPortEnabled: true
  ports:
    amqp: 5672
    amqpTls: 5671
    dist: 25672
    manager: 15672
    metrics: 9419
    epmd: 4369
  portNames:
    amqp: "amqp"
    amqpTls: "amqp-tls"
    dist: "dist"
    manager: "http-stats"
    metrics: "metrics"
    epmd: "epmd"
  nodePorts:
    amqp: ""
    amqpTls: ""
    dist: ""
    manager: ""
    epmd: ""
    metrics: ""
  extraPorts: []
  extraPortsHeadless: []
  loadBalancerSourceRanges: []
  allocateLoadBalancerNodePorts: true
  externalIPs: []
  externalTrafficPolicy: Cluster
  loadBalancerClass: ""
  loadBalancerIP: ""
  clusterIP: ""
  labels: {}
  annotations: {}
  annotationsHeadless: {}
  headless:
    annotations: {}
  sessionAffinity: None
  sessionAffinityConfig: {}
  trafficDistribution: "PreferClose"
ingress:
  enabled: false
  path: /
  pathType: ImplementationSpecific
  hostname: rabbitmq.local
  annotations: {}
  tls: false
  selfSigned: false
  extraHosts: []
  extraPaths: []
  extraRules: []
  extraTls: []
  secrets: []
  ingressClassName: ""
  existingSecret: ""
networkPolicy:
  enabled: true
  kubeAPIServerPorts: [443, 6443, 8443]
  allowExternal: true
  allowExternalEgress: true
  addExternalClientAccess: true
  extraIngress: []
  extraEgress: []
  #
  ingressPodMatchLabels: {}
  ingressNSMatchLabels: {}
  ingressNSPodMatchLabels: {}
# Metrics Parameters

metrics:
  enabled: false
  plugins: "rabbitmq_prometheus"
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "{{ .Values.service.ports.metrics }}"
  serviceMonitor:
    namespace: ""
    jobLabel: ""
    targetLabels: {}
    podTargetLabels: {}
    selector: {}
    labels: {}
    annotations: {}
    default:
      enabled: false
      interval: 30s
      scrapeTimeout: ""
      relabelings: [ ]
      metricRelabelings: [ ]
      honorLabels: false
    perObject:
      enabled: false
      interval: 30s
      scrapeTimeout: ""
      relabelings: [ ]
      metricRelabelings: [ ]
      honorLabels: false
    detailed:
      enabled: false
      family: []
      vhost: []
      interval: 30s
      scrapeTimeout: ""
      relabelings: [ ]
      metricRelabelings: [ ]
      honorLabels: false

    enabled: false
    interval: 30s
    scrapeTimeout: ""
    relabelings: [ ]
    metricRelabelings: [ ]
    honorLabels: false
    path: ""
    params: { }

  prometheusRule:
    enabled: false
    additionalLabels: {}
    namespace: ""
    rules: []
# Init Container Parameters

volumePermissions:
  enabled: false
  image:
    registry: ghcr.io
    repository: nix-containers/os-shell-nixchart
    tag: 12-debian-12-r50
    digest: ""
    pullPolicy: IfNotPresent
    pullSecrets: []
  resourcesPreset: "nano"
  resources: {}
  containerSecurityContext:
    seLinuxOptions: {}
    runAsUser: 0
