
# Global parameters

global:
  imageRegistry: ""
  imagePullSecrets: []
  defaultStorageClass: ""
  storageClass: ""
  security:
    allowInsecureImages: false
  compatibility:
    openshift:
      adaptSecurityContext: auto
# Common parameters

kubeVersion: ""
nameOverride: ""
fullnameOverride: ""
clusterDomain: cluster.local
extraDeploy: []
commonLabels: {}
commonAnnotations: {}
namespaceOverride: ""
usePasswordFiles: true
diagnosticMode:
  enabled: false
  command:
    - sleep
  args:
    - infinity
# ZooKeeper chart parameters

image:
  registry: ghcr.io
  repository: nix-containers/zookeeper-nixchart
  tag: v3.9.5
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []
  debug: false
auth:
  client:
    enabled: false
    clientUser: ""
    clientPassword: ""
    serverUsers: ""
    serverPasswords: ""
    existingSecret: ""
  quorum:
    enabled: false
    learnerUser: ""
    learnerPassword: ""
    serverUsers: ""
    serverPasswords: ""
    existingSecret: ""
tickTime: 2000
initLimit: 10
syncLimit: 5
preAllocSize: 65536
snapCount: 100000
maxClientCnxns: 60
maxSessionTimeout: 40000
heapSize: 1024
fourlwCommandsWhitelist: srvr, mntr, ruok
minServerId: 1
listenOnAllIPs: false
zooServers: ""
autopurge:
  snapRetainCount: 10
  purgeInterval: 1
logLevel: ERROR
jvmFlags: ""
dataLogDir: ""
configuration: ""
existingConfigmap: ""
extraEnvVars: []
extraEnvVarsCM: ""
extraEnvVarsSecret: ""
command:
  - /scripts/setup.sh
args: []
# Statefulset parameters

replicaCount: 1
revisionHistoryLimit: 10
containerPorts:
  client: 2181
  tls: 3181
  follower: 2888
  election: 3888
  adminServer: 8080
  metrics: 9141
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1
  probeCommandTimeout: 3
readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1
  probeCommandTimeout: 2
startupProbe:
  enabled: false
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 15
  successThreshold: 1
customLivenessProbe: {}
customReadinessProbe: {}
customStartupProbe: {}
lifecycleHooks: {}
resourcesPreset: "micro"
resources: {}
podSecurityContext:
  enabled: true
  fsGroupChangePolicy: Always
  sysctls: []
  supplementalGroups: []
  fsGroup: 1001
containerSecurityContext:
  enabled: true
  seLinuxOptions: {}
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  privileged: false
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: "RuntimeDefault"
automountServiceAccountToken: false
hostAliases: []
podLabels: {}
podAnnotations: {}
podAffinityPreset: ""
podAntiAffinityPreset: soft
nodeAffinityPreset:
  type: ""
  key: ""
  values: []
affinity: {}
nodeSelector: {}
tolerations: []
topologySpreadConstraints: []
podManagementPolicy: Parallel
priorityClassName: ""
schedulerName: ""
updateStrategy:
  type: RollingUpdate
  rollingUpdate: {}
extraVolumes: []
extraVolumeMounts: []
sidecars: []
initContainers: []
pdb:
  create: true
  minAvailable: ""
  maxUnavailable: ""
enableServiceLinks: true
dnsPolicy: ""
dnsConfig: {}
# Traffic Exposure parameters
service:
  type: ClusterIP
  ports:
    client: 2181
    tls: 3181
    follower: 2888
    election: 3888
  nodePorts:
    client: ""
    tls: ""
  disableBaseClientPort: false
  sessionAffinity: None
  sessionAffinityConfig: {}
  clusterIP: ""
  loadBalancerIP: ""
  loadBalancerSourceRanges: []
  externalTrafficPolicy: Cluster
  annotations: {}
  extraPorts: []
  headless:
    publishNotReadyAddresses: true
    annotations: {}
    servicenameOverride: ""
networkPolicy:
  enabled: true
  allowExternal: true
  allowExternalEgress: true
  extraIngress: []
  extraEgress: []
  ingressNSMatchLabels: {}
  ingressNSPodMatchLabels: {}
# Other Parameters

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false
  annotations: {}
# Persistence parameters

persistence:
  enabled: true
  existingClaim: ""
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  annotations: {}
  labels: {}
  selector: {}
  dataLogDir:
    size: 8Gi
    existingClaim: ""
    selector: {}
# Volume Permissions parameters

volumePermissions:
  enabled: false
  image:
    registry: ghcr.io
    repository: nix-containers/os-shell-nixchart
    tag: 12-debian-12-r50
    digest: ""
    pullPolicy: IfNotPresent
    pullSecrets: []
  resourcesPreset: "nano"
  resources: {}
  containerSecurityContext:
    enabled: true
    seLinuxOptions: {}
    runAsUser: 0
# Metrics parameters

metrics:
  enabled: false
  service:
    type: ClusterIP
    port: 9141
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "{{ .Values.metrics.service.port }}"
      prometheus.io/path: "/metrics"
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: ""
    scrapeTimeout: ""
    additionalLabels: {}
    selector: {}
    relabelings: []
    metricRelabelings: []
    honorLabels: false
    jobLabel: ""
    scheme: ""
    tlsConfig: {}
  prometheusRule:
    enabled: false
    namespace: ""
    additionalLabels: {}
    rules: []
# TLS/SSL parameters

tls:
  client:
    enabled: false
    auth: "none"
    autoGenerated: false
    existingSecret: ""
    existingSecretKeystoreKey: ""
    existingSecretTruststoreKey: ""
    keystorePath: /opt/nix-containers/zookeeper/config/certs/client/zookeeper.keystore.jks
    truststorePath: /opt/nix-containers/zookeeper/config/certs/client/zookeeper.truststore.jks
    passwordsSecretName: ""
    passwordsSecretKeystoreKey: ""
    passwordsSecretTruststoreKey: ""
    keystorePassword: ""
    truststorePassword: ""
  quorum:
    enabled: false
    auth: "none"
    autoGenerated: false
    existingSecret: ""
    existingSecretKeystoreKey: ""
    existingSecretTruststoreKey: ""
    keystorePath: /opt/nix-containers/zookeeper/config/certs/quorum/zookeeper.keystore.jks
    truststorePath: /opt/nix-containers/zookeeper/config/certs/quorum/zookeeper.truststore.jks
    passwordsSecretName: ""
    passwordsSecretKeystoreKey: ""
    passwordsSecretTruststoreKey: ""
    keystorePassword: ""
    truststorePassword: ""
  resourcesPreset: "nano"
  resources: {}
