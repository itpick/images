
# Global parameters

global:
  imageRegistry: ""
  imagePullSecrets: []
  defaultStorageClass: ""
  security:
    allowInsecureImages: false
  compatibility:
    openshift:
      adaptSecurityContext: auto

# Common parameters

nameOverride: ""
namespaceOverride: ""
fullnameOverride: ""
commonLabels: {}
commonAnnotations: {}
kubeVersion: ""
apiVersions: []
clusterDomain: cluster.local
extraDeploy: []

# MinIO&reg; parameters

image:
  registry: ghcr.io
  repository: nix-containers/minio-nixchart
  tag: 2025.7.23-debian-12-r3
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []
  debug: false
clientImage:
  registry: ghcr.io
  repository: nix-containers/minio-client-nixchart
  tag: 2025.7.21-debian-12-r2
  digest: ""
auth:
  rootUser: admin
  rootPassword: ""
  existingSecret: ""
  rootUserSecretKey: ""
  rootPasswordSecretKey: ""
  forcePassword: false
  usePasswordFiles: true
  useSecret: true
  forceNewKeys: false
defaultBuckets: ""
tls:
  enabled: false
  autoGenerated:
    enabled: true
    engine: helm
    certManager:
      existingIssuer: ""
      existingIssuerKind: ""
      keySize: 2048
      keyAlgorithm: RSA
      duration: 2160h
      renewBefore: 360h
  ca: ""
  existingCASecret: ""
  server:
    cert: ""
    key: ""
    existingSecret: ""

extraEnvVars: []
extraEnvVarsCM: ""
extraEnvVarsSecret: ""
command: []
args: []

# MinIO&reg; Deployment/StatefulSet parameters

mode: standalone
schedulerName: ""
terminationGracePeriodSeconds: ""
updateStrategy:
  type: RollingUpdate
statefulset:
  podManagementPolicy: Parallel
  replicaCount: 4
  zones: 1
  drivesPerNode: 1
automountServiceAccountToken: false
hostAliases: []
containerPorts:
  api: 9000
podSecurityContext:
  enabled: true
  sysctls: []
  supplementalGroups: []
  fsGroup: 1001
  fsGroupChangePolicy: "OnRootMismatch"
containerSecurityContext:
  enabled: true
  seLinuxOptions: {}
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  privileged: false
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: "RuntimeDefault"
podLabels: {}
podAnnotations: {}
podAffinityPreset: ""
podAntiAffinityPreset: soft
nodeAffinityPreset:
  type: ""
  key: ""
  values: []
affinity: {}
nodeSelector: {}
tolerations: []
topologySpreadConstraints: []
priorityClassName: ""
runtimeClassName: ""
resourcesPreset: "micro"
resources: {}
livenessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 5
readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 1
  successThreshold: 1
  failureThreshold: 5
startupProbe:
  enabled: false
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 60
customLivenessProbe: {}
customReadinessProbe: {}
customStartupProbe: {}
lifecycleHooks: {}
extraVolumes: []
extraVolumeMounts: []
initContainers: []
sidecars: []
pdb:
  create: true
  minAvailable: ""
  maxUnavailable: ""
autoscaling:
  vpa:
    enabled: false
    annotations: {}
    controlledResources: []
    maxAllowed: {}
    minAllowed: {}
    updatePolicy:
      updateMode: Auto
defaultInitContainers:
  volumePermissions:
    enabled: false
    image:
      registry: ghcr.io
      repository: nix-containers/os-shell-nixchart
      tag: 12-debian-12-r50
      digest: ""
      pullPolicy: IfNotPresent
      pullSecrets: []
    containerSecurityContext:
      enabled: true
      seLinuxOptions: {}
      runAsUser: 0
      privileged: false
      allowPrivilegeEscalation: false
      capabilities:
        add: ["CHOWN"]
        drop: ["ALL"]
      seccompProfile:
        type: "RuntimeDefault"
    resourcesPreset: "nano"
    resources: {}

# MinIO&reg; Traffic exposure parameters

service:
  type: ClusterIP
  ports:
    api: 9000
  nodePorts:
    api: ""
  clusterIP: ""
  loadBalancerIP: ""
  loadBalancerSourceRanges: []
  externalTrafficPolicy: Cluster
  extraPorts: []
  annotations: {}
  headless:
    annotations: {}
ingress:
  enabled: false
  apiVersion: ""
  ingressClassName: ""
  hostname: minio.local
  path: /
  pathType: ImplementationSpecific
  annotations: {}
  tls: false
  selfSigned: false
  extraHosts: []
  extraPaths: []
  extraTls: []
  secrets: []
  extraRules: []
networkPolicy:
  enabled: true
  allowExternal: true
  allowExternalEgress: true
  addExternalClientAccess: true
  extraIngress: []
  extraEgress: []
  #
  ingressPodMatchLabels: {}
  ingressNSMatchLabels: {}
  ingressNSPodMatchLabels: {}

# MinIO&reg; Persistence parameters

persistence:
  enabled: true
  storageClass: ""
  mountPath: /nix-containers/minio/data
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  annotations: {}
  existingClaim: ""
  selector: {}
  dataSource: {}

# RBAC parameters

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false
  annotations: {}

# Metrics parameters

metrics:
  prometheusAuthType: public
  enabled: false
  serviceMonitor:
    enabled: false
    namespace: ""
    labels: {}
    jobLabel: ""
    paths:
      - /minio/v2/metrics/cluster
      - /minio/v2/metrics/node
    interval: 30s
    scrapeTimeout: ""
    metricRelabelings: []
    relabelings: []
    honorLabels: false
    selector: {}
    apiVersion: ""
    tlsConfig: {}
  prometheusRule:
    enabled: false
    namespace: ""
    additionalLabels: {}
    # - alert: minio cluster nodes offline
    #   annotations:
    #     summary: "minio cluster nodes offline"
    #     description: "minio cluster nodes offline, pod {{`{{`}} $labels.pod {{`}}`}} service {{`{{`}} $labels.job {{`}}`}} offline"
    #   for: 10m
    #   expr: minio_cluster_nodes_offline_total > 0
    #   labels:
    #     severity: critical
    #     group: PaaS
    rules: []

