
# Global parameters

global:
  imageRegistry: ""
  imagePullSecrets: []
  defaultStorageClass: ""
  security:
    allowInsecureImages: false
  compatibility:
    openshift:
      adaptSecurityContext: auto
# Common parameters

kubeVersion: ""
nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""
commonLabels: {}
commonAnnotations: {}
clusterDomain: cluster.local
extraDeploy: []
usePasswordFiles: true
diagnosticMode:
  enabled: false
  command:
    - sleep
  args:
    - infinity
# etcd parameters

image:
  registry: ghcr.io
  repository: nix-containers/etcd-nixchart
  tag: 3.6.4-debian-12-r3
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []
  debug: false
auth:
  rbac:
    create: true
    allowNoneAuthentication: true
    rootPassword: ""
    existingSecret: ""
    existingSecretPasswordKey: ""
  token:
    enabled: true
    type: jwt
    privateKey:
      filename: jwt-token.pem
      existingSecret: ""
    signMethod: RS256
    ttl: 10m
  client:
    secureTransport: false
    useAutoTLS: false
    existingSecret: ""
    enableAuthentication: false
    certFilename: cert.pem
    certKeyFilename: key.pem
    caFilename: ""
  peer:
    secureTransport: false
    useAutoTLS: false
    existingSecret: ""
    enableAuthentication: false
    certFilename: cert.pem
    certKeyFilename: key.pem
    caFilename: ""
autoCompactionMode: ""
autoCompactionRetention: ""
initialClusterToken: "etcd-cluster-k8s"
logLevel: "info"
maxProcs: ""
configuration: ""
existingConfigmap: ""
extraEnvVars: []
extraEnvVarsCM: ""
extraEnvVarsSecret: ""
command: []
args: []
# etcd statefulset parameters

replicaCount: 1
updateStrategy:
  type: RollingUpdate
podManagementPolicy: Parallel
automountServiceAccountToken: false
hostAliases: []
lifecycleHooks: {}
containerPorts:
  client: 2379
  peer: 2380
  metrics: 9090
podSecurityContext:
  enabled: true
  fsGroupChangePolicy: Always
  sysctls: []
  supplementalGroups: []
  fsGroup: 1001
containerSecurityContext:
  enabled: true
  seLinuxOptions: {}
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  privileged: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: "RuntimeDefault"
resourcesPreset: "micro"
resources: {}
livenessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 5
readinessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 5
startupProbe:
  enabled: false
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 60
customLivenessProbe: {}
customReadinessProbe: {}
customStartupProbe: {}
extraVolumes: []
extraVolumeMounts: []
extraVolumeClaimTemplates: []
initContainers: []
sidecars: []
podAnnotations: {}
podLabels: {}
podAffinityPreset: ""
podAntiAffinityPreset: soft
nodeAffinityPreset:
  type: ""
  key: ""
  values: []
affinity: {}
nodeSelector: {}
tolerations: []
terminationGracePeriodSeconds: ""
schedulerName: ""
priorityClassName: ""
runtimeClassName: ""
shareProcessNamespace: false
topologySpreadConstraints: []
persistentVolumeClaimRetentionPolicy:
  enabled: false
  whenScaled: Retain
  whenDeleted: Retain
# Traffic exposure parameters

service:
  type: ClusterIP
  enabled: true
  clusterIP: ""
  ports:
    client: 2379
    peer: 2380
    metrics: 9090
  nodePorts:
    client: ""
    peer: ""
    metrics: ""
  clientPortNameOverride: ""
  peerPortNameOverride: ""
  metricsPortNameOverride: ""
  loadBalancerIP: ""
  loadBalancerClass: ""
  loadBalancerSourceRanges: []
  externalIPs: []
  externalTrafficPolicy: Cluster
  extraPorts: []
  annotations: {}
  sessionAffinity: None
  sessionAffinityConfig: {}
  headless:
    annotations: {}
# Persistence parameters

persistence:
  enabled: true
  storageClass: ""
  annotations: {}
  labels: {}
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  selector: {}
# Volume Permissions parameters

volumePermissions:
  enabled: false
  image:
    registry: ghcr.io
    repository: nix-containers/os-shell-nixchart
    tag: 12-debian-12-r50
    digest: ""
    pullPolicy: IfNotPresent
    pullSecrets: []
  resourcesPreset: "nano"
  resources: {}
# Network Policy parameters
networkPolicy:
  enabled: true
  allowExternal: true
  allowExternalEgress: true
  extraIngress: []
  extraEgress: []
  ingressNSMatchLabels: {}
  ingressNSPodMatchLabels: {}
# Metrics parameters
metrics:
  enabled: false
  #
  useSeparateEndpoint: false
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "{{ .Values.metrics.useSeparateEndpoint | ternary .Values.containerPorts.metrics .Values.containerPorts.client }}"
  podMonitor:
    enabled: false
    namespace: monitoring
    interval: 30s
    scrapeTimeout: 30s
    additionalLabels: {}
    scheme: http
    tlsConfig: {}
    relabelings: []
  prometheusRule:
    enabled: false
    namespace: ""
    additionalLabels: {}
    # - alert: ETCD has no leader
    #   annotations:
    #     summary: "ETCD has no leader"
    #     description: "pod {{`{{`}} $labels.pod {{`}}`}} state error, can't connect leader"
    #   for: 1m
    #   expr: etcd_server_has_leader == 0
    #   labels:
    #     severity: critical
    #     group: PaaS
    rules: []
# Snapshotting parameters

startFromSnapshot:
  enabled: false
  existingClaim: ""
  snapshotFilename: ""
disasterRecovery:
  enabled: false
  cronjob:
    schedule: "*/30 * * * *"
    historyLimit: 1
    snapshotHistoryLimit: 1
    snapshotsDir: "/snapshots"
    podAnnotations: {}
    podSecurityContext:
      enabled: true
      fsGroupChangePolicy: Always
      sysctls: []
      supplementalGroups: []
      fsGroup: 1001
    containerSecurityContext:
      enabled: true
      seLinuxOptions: {}
      runAsUser: 1001
      runAsGroup: 1001
      runAsNonRoot: true
      privileged: false
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: "RuntimeDefault"
    resourcesPreset: "nano"
    resources: {}
    nodeSelector: {}
    tolerations: []
    podLabels: {}
    serviceAccountName: ""
    command: []
  pvc:
    existingClaim: ""
    size: 2Gi
    storageClassName: nfs
    subPath: ""
# Service account parameters
serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false
  annotations: {}
  labels: {}

# etcd "pre-upgrade" K8s Job parameters
preUpgradeJob:
  enabled: true
  annotations: {}
  podLabels: {}
  podAnnotations: {}
  podAffinityPreset: ""
  podAntiAffinityPreset: soft
  nodeAffinityPreset:
    type: ""
    key: ""
    values: []
  affinity: {}
  nodeSelector: {}
  tolerations: []
  containerSecurityContext:
    enabled: true
    seLinuxOptions: {}
    runAsUser: 1001
    runAsGroup: 1001
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    privileged: false
    allowPrivilegeEscalation: false
    capabilities:
      add: []
      drop: ["ALL"]
    seccompProfile:
      type: "RuntimeDefault"
  podSecurityContext:
    enabled: true
    fsGroupChangePolicy: Always
    sysctls: []
    supplementalGroups: []
    fsGroup: 1001
  resourcesPreset: "micro"
  resources: {}
  startDelay: ""

# Defragmentation parameters

defrag:
  enabled: false
  cronjob:
    startingDeadlineSeconds: ""
    schedule: "0 0 * * *"
    concurrencyPolicy: Forbid
    suspend: false
    successfulJobsHistoryLimit: 1
    failedJobsHistoryLimit: 1
    labels: {}
    annotations: {}
    activeDeadlineSeconds: ""
    restartPolicy: OnFailure
    podLabels: {}
    podAnnotations: {}
    podSecurityContext:
      enabled: true
      fsGroupChangePolicy: Always
      sysctls: []
      supplementalGroups: []
      fsGroup: 1001
    containerSecurityContext:
      enabled: true
      seLinuxOptions: {}
      runAsUser: 1001
      runAsGroup: 1001
      runAsNonRoot: true
      privileged: false
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: "RuntimeDefault"
    nodeSelector: {}
    tolerations: []
    serviceAccountName: ""
    command: []
    args: []
    resourcesPreset: "nano"
    resources: {}
    extraEnvVars: []
    extraEnvVarsCM: ""
    extraEnvVarsSecret: ""

# Other parameters

pdb:
  create: true
  minAvailable: 51%
  maxUnavailable: ""
