      annotations: {}
      extraPorts: []
  masterService:
    enabled: false
    type: ClusterIP
    ports:
      redis: 6379
    nodePorts:
      redis: ""
    externalTrafficPolicy: ""
    extraPorts: []
    clusterIP: ""
    loadBalancerIP: ""
