    sessionAffinity: None
    sessionAffinityConfig: {}
  terminationGracePeriodSeconds: 30
  extraPodSpec: {}

  externalAccess:
    enabled: false
    service:
      loadBalancerIPAnnotaion: ""
      type: LoadBalancer
      redisPort: 6379

      sentinelPort: 26379
      loadBalancerIP: []
      loadBalancerClass: ""
      loadBalancerSourceRanges: []
      annotations: {}

# Other Parameters

serviceBindings:
  enabled: false
networkPolicy:
  enabled: true
  allowExternal: true
  allowExternalEgress: true
  extraIngress: []
  extraEgress: []
  ingressNSMatchLabels: {}
  ingressNSPodMatchLabels: {}
