      updatePolicy:
        updateMode: Auto
    hpa:
      enabled: false
      minReplicas: ""
      maxReplicas: ""
      targetCPU: ""
      targetMemory: ""
  serviceAccount:
    create: true
    name: ""
    automountServiceAccountToken: false
    annotations: {}
  pdb:
    create: true
    minAvailable: ""
    maxUnavailable: ""

# Valkey Sentinel configuration parameters

sentinel:
  enabled: false
  image:
    registry: ghcr.io
    repository: nix-containers/valkey-sentinel-nixchart
    tag: 8.1.3-debian-12-r3
