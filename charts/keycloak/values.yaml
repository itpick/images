
# Global parameters

global:
  imageRegistry: ""
  imagePullSecrets: []
  defaultStorageClass: ""
  security:
    allowInsecureImages: false
  compatibility:
    openshift:
      adaptSecurityContext: auto
    omitEmptySeLinuxOptions: false

# Common parameters

kubeVersion: ""
apiVersions: []
nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""
commonLabels: {}
commonAnnotations: {}
clusterDomain: cluster.local
extraDeploy: []
diagnosticMode:
  enabled: false
  command:
    - sleep
  args:
    - infinity
useHelmHooks: true
usePasswordFiles: true

# Keycloak parameters

image:
  registry: ghcr.io
  repository: nix-containers/keycloak-nixchart
  tag: v26.6.3
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []
  debug: false
auth:
  adminUser: user
  adminPassword: ""
  existingSecret: ""
  passwordSecretKey: ""
  annotations: {}
production: false
tls:
  enabled: false
  usePemCerts: false
  autoGenerated:
    enabled: true
    engine: helm
    certManager:
      existingIssuer: ""
      existingIssuerKind: ""
      keySize: 2048
      keyAlgorithm: RSA
      duration: 2160h
      renewBefore: 360h
  existingSecret: ""
  certFilename: "tls.crt"
  certKeyFilename: "tls.key"
  keystoreFilename: "keycloak.keystore.jks"
  truststoreFilename: "keycloak.truststore.jks"
  keystorePassword: ""
  truststorePassword: ""
  passwordsSecret: ""
trustedCertsExistingSecret: ""
adminRealm: "master"
proxyHeaders: ""
hostnameStrict: false
httpEnabled: false
httpRelativePath: "/"
cache:
  enabled: true
  stack: jdbc-ping
  configFile: "cache-ispn.xml"
  useHeadlessServiceWithAppVersion: false
  javaOptsAppendExtra: ""
logging:
  output: default
  level: INFO
configuration: ""
existingConfigmap: ""
extraStartupArgs: ""
initdbScripts: {}
initdbScriptsConfigMap: ""
command: []
args: []
extraEnvVars: []
extraEnvVarsCM: ""
extraEnvVarsSecret: ""
containerPorts:
  http: 8080
  https: 8443
  management: 9000
extraContainerPorts: []
podSecurityContext:
  enabled: true
  fsGroupChangePolicy: Always
  sysctls: []
  supplementalGroups: []
  fsGroup: 1001
containerSecurityContext:
  enabled: true
  seLinuxOptions: {}
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  privileged: false
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: "RuntimeDefault"
resourcesPreset: "small"
resources: {}
livenessProbe:
  enabled: true
  initialDelaySeconds: 120
  periodSeconds: 1
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1
readinessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3
  successThreshold: 1
startupProbe:
  enabled: false
  initialDelaySeconds: 30
  periodSeconds: 5
  timeoutSeconds: 1
  failureThreshold: 10
  successThreshold: 1
customLivenessProbe: {}
customReadinessProbe: {}
customStartupProbe: {}

# Keycloak StatefulSet parameters

replicaCount: 1
updateStrategy:
  type: RollingUpdate
revisionHistoryLimitCount: 10
minReadySeconds: 0
statefulsetAnnotations: {}
automountServiceAccountToken: true
hostAliases: []
podLabels: {}
podAnnotations: {}
podAffinityPreset: ""
podAntiAffinityPreset: soft
nodeAffinityPreset:
  type: ""
  key: ""
  values: []
affinity: {}
nodeSelector: {}
tolerations: []
topologySpreadConstraints: []
podManagementPolicy: Parallel
priorityClassName: ""
schedulerName: ""
terminationGracePeriodSeconds: ""
lifecycleHooks: {}
dnsPolicy: ""
dnsConfig: {}
enableServiceLinks: true
extraVolumes: []
extraVolumeMounts: []
initContainers: []
sidecars: []

# Traffic Exposure Parameters

service:
  type: ClusterIP
  http:
    enabled: true
  ports:
    http: 80
    https: 443
  nodePorts:
    http: ""
    https: ""
  extraPorts: []
  sessionAffinity: None
  sessionAffinityConfig: {}
  clusterIP: ""
  loadBalancerIP: ""
  loadBalancerSourceRanges: []
  externalTrafficPolicy: Cluster
  annotations: {}
  headless:
    annotations: {}
    extraPorts: []
ingress:
  enabled: false
  pathType: ImplementationSpecific
  apiVersion: ""
  hostname: keycloak.local
  ingressClassName: ""
  controller: default
  path: "{{ .Values.httpRelativePath }}"
  servicePort: http
  annotations: {}
  labels: {}
  tls: false
  selfSigned: false
  extraHosts: []
  extraPaths: []
  extraTls: []
  secrets: []
  extraRules: []
networkPolicy:
  enabled: true
  allowExternal: true
  allowExternalEgress: true
  addExternalClientAccess: true
  kubeAPIServerPorts: [443, 6443, 8443]
  extraIngress: []
  extraEgress: []
  #
  ingressPodMatchLabels: {}
  ingressNSMatchLabels: {}
  ingressNSPodMatchLabels: {}

# Other parameters

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: true
  extraLabels: {}
pdb:
  create: true
  minAvailable: ""
  maxUnavailable: ""
autoscaling:
  vpa:
    enabled: false
    annotations: {}
    controlledResources: []
    maxAllowed: {}
    minAllowed: {}
    updatePolicy:
      updateMode: Auto
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 11
    targetCPU: ""
    targetMemory: ""
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 120
        selectPolicy: Max
        policies: []
      scaleDown:
        stabilizationWindowSeconds: 300
        selectPolicy: Max
        policies:
          - type: Pods
            value: 1
            periodSeconds: 300

# Metrics parameters

metrics:
  enabled: false
  service:
    ports:
      metrics: 9000
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "{{ .Values.metrics.service.ports.metrics }}"
    extraPorts: []
  serviceMonitor:
    enabled: false
    namespace: ""
    annotations: {}
    labels: {}
    jobLabel: ""
    honorLabels: false
    tlsConfig: {}
    interval: ""
    scrapeTimeout: ""
    metricRelabelings: []
    relabelings: []
    selector: {}
  prometheusRule:
    enabled: false
    namespace: ""
    labels: {}
    groups: []

# Telemetry parameters
telemetry:
  enabled: false
  endpoint: "http://localhost:4317"
  protocol: "grpc"
  serviceName: "keycloak"
  resourceAttributes: ""
  headers: {}
  tracing:
    enabled: false
    endpoint: ""
    protocol: ""
  metrics:
    enabled: false
    interval: "60s"
    endpoint: ""
    protocol: ""
    headers: {}
  logs:
    enabled: false
    level: "all"
    endpoint: ""
    protocol: ""
    headers: {}

# keycloak-config-cli parameters

keycloakConfigCli:
  enabled: false
  image:
    registry: ghcr.io
    repository: nix-containers/keycloak-config-cli-nixchart
    tag: 6.4.0-debian-12-r11
    digest: ""
    pullPolicy: IfNotPresent
    pullSecrets: []
  annotations: {}
  command: []
  args: []
  automountServiceAccountToken: true
  hostAliases: []
  resourcesPreset: "small"
  resources: {}
  containerSecurityContext:
    enabled: true
    seLinuxOptions: {}
    runAsUser: 1001
    runAsGroup: 1001
    runAsNonRoot: true
    privileged: false
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: "RuntimeDefault"
  podSecurityContext:
    enabled: true
    fsGroupChangePolicy: Always
    sysctls: []
    supplementalGroups: []
    fsGroup: 1001
  backoffLimit: 1
  podLabels: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  availabilityCheck:
    enabled: true
    timeout: ""
  extraEnvVars: []
  extraEnvVarsCM: ""
  extraEnvVarsSecret: ""
  extraVolumes: []
  extraVolumeMounts: []
  initContainers: []
  sidecars: []
  configuration: {}
  existingConfigmap: ""
  cleanupAfterFinished:
    enabled: false
    seconds: 600

# Default init container parameters

defaultInitContainers:
  prepareWriteDirs:
    enabled: true
    containerSecurityContext:
      enabled: true
      seLinuxOptions: {}
      runAsUser: 1001
      runAsGroup: 1001
      runAsNonRoot: true
      privileged: false
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: "RuntimeDefault"
    resourcesPreset: "nano"
    resources: {}

# Database parameters

postgresql:
  enabled: true
  auth:
    postgresPassword: ""
    username: bn_keycloak
    password: ""
    database: nix-containers_keycloak
    existingSecret: ""
    secretKeys:
      userPasswordKey: password
  architecture: standalone
externalDatabase:
  host: ""
  port: 5432
  user: bn_keycloak
  database: nix-containers_keycloak
  schema: public
  password: ""
  existingSecret: ""
  existingSecretUserKey: ""
  existingSecretPasswordKey: ""
  annotations: {}
  extraParams: ""
