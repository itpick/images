
# Global parameters

global:
  imageRegistry: ""
  imagePullSecrets: []
  defaultStorageClass: ""
  storageClass: ""
  security:
    allowInsecureImages: false
  elasticsearch:
    service:
      name: elasticsearch
      fullname: ""
      ports:
        restAPI: 9200
  kibanaEnabled: false
  compatibility:
    openshift:
      adaptSecurityContext: auto
# Common parameters

kubeVersion: ""
nameOverride: ""
fullnameOverride: ""
commonLabels: {}
commonAnnotations: {}
clusterDomain: cluster.local
extraDeploy: []
namespaceOverride: ""
usePasswordFiles: true
diagnosticMode:
  enabled: false
