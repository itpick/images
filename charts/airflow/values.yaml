# Airflow ldap parameters

ldap:
  enabled: false
  uri: "ldap://ldap_server:389"
  basedn: "dc=example,dc=org"
  searchAttribute: "cn"
  firstnameField: "givenName"
  lastnameField: "sn"
  emailField: "mail"
  binddn: "cn=admin,dc=example,dc=org"
  bindpw: ""
  existingSecret: ""
  userRegistration: 'True'
  userRegistrationRole: "Public"
  rolesMapping: '{ "cn=All,ou=Groups,dc=example,dc=org": ["User"], "cn=Admins,ou=Groups,dc=example,dc=org": ["Admin"], }'
  rolesSyncAtLogin: 'True'
  tls:
    enabled: false
    allowSelfSigned: true
    certificatesSecret: ""
    certificatesMountPath: /opt/nix-containers/airflow/conf/certs
    CAFilename: ""
