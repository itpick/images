<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{NAME}} — nix-containers</title>
  <link rel="stylesheet" href="{{BASE}}static/css/site.css">
</head>
<body class="bg-bg-base text-fg-primary min-h-screen">
  <header class="border-b border-neutral-800 bg-bg-elevated">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="{{BASE}}" class="font-mono text-lg font-bold text-accent-ok">
        nix-containers
      </a>
      <nav class="text-sm text-fg-muted space-x-4">
        <a href="{{BASE}}" class="hover:text-fg-primary">All images</a>
        <a href="https://github.com/nix-containers/images"
           class="hover:text-fg-primary">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold font-mono mb-2">{{NAME}}</h1>
    <div class="mb-4 flex items-center gap-2 text-sm">
      <span class="badge-cat-{{CATEGORY_SLUG}}">{{CATEGORY}}</span>
      <span class="text-fg-muted">{{VERSION}}</span>
    </div>
    {{POPULARITY_HTML}}
    <p class="text-fg-muted mb-8">{{DESCRIPTION}}</p>

    <section class="card mb-6">
      <h2 class="text-sm font-semibold text-fg-muted uppercase tracking-wide mb-2">Pull</h2>
      <div class="flex items-center gap-2">
        <code id="pull-cmd"
              class="flex-1 bg-bg-base rounded px-3 py-2 text-sm overflow-x-auto">{{PULL_COMMAND}}</code>
        <button onclick="navigator.clipboard.writeText(document.getElementById('pull-cmd').innerText)"
                class="bg-bg-input hover:bg-neutral-700 text-sm rounded px-3 py-2">Copy</button>
      </div>
    </section>

    <nav class="tab-bar" role="tablist" aria-label="Image details">
      <button type="button" class="tab-button tab-active" data-tab="description" role="tab" aria-selected="true">Description</button>
      <button type="button" class="tab-button tab-inactive" data-tab="vulnerabilities" role="tab" aria-selected="false">Vulnerabilities</button>
      <button type="button" class="tab-button tab-inactive" data-tab="sbom" role="tab" aria-selected="false">SBOM</button>
      <button type="button" class="tab-button tab-inactive" data-tab="used-by" role="tab" aria-selected="false">Used by</button>
      <button type="button" class="tab-button tab-inactive" data-tab="source" role="tab" aria-selected="false">Source</button>
    </nav>

    <section class="tab-content" data-tab-panel="description" role="tabpanel">
      <div class="card">
        <div class="prose prose-invert max-w-none">{{README_HTML}}</div>
      </div>
    </section>

    <section class="tab-content hidden" data-tab-panel="vulnerabilities" role="tabpanel">
      <div class="card">
        {{SCAN_PANEL_HTML}}
      </div>
    </section>

    <section class="tab-content hidden" data-tab-panel="sbom" role="tabpanel">
      <div class="card">
        {{SBOM_HTML}}
      </div>
    </section>

    <section class="tab-content hidden" data-tab-panel="used-by" role="tabpanel">
      <div class="card">
        {{USED_BY_HTML}}
      </div>
    </section>

    <section class="tab-content hidden" data-tab-panel="source" role="tabpanel">
      <div class="card">
        <p class="text-fg-muted text-sm mb-4">
          <a href="https://github.com/nix-containers/images/blob/main/images/{{NAME}}/default.nix"
             class="text-accent-ok hover:underline">View on GitHub →</a>
        </p>
        <div class="text-sm">{{NIX_HTML}}</div>
      </div>
    </section>
  </main>

  <footer class="border-t border-neutral-800 mt-12 py-6 text-center text-fg-muted text-sm">
    Built {{BUILD_TIME}} · <a href="{{BASE}}" class="hover:text-fg-primary">All images</a>
  </footer>

  <script>
    // Vanilla JS tab switcher; no framework dependency.
    (function () {
      const buttons = document.querySelectorAll('.tab-button[data-tab]');
      const panels = document.querySelectorAll('.tab-content[data-tab-panel]');
      buttons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          const target = btn.getAttribute('data-tab');
          buttons.forEach(function (b) {
            const active = b.getAttribute('data-tab') === target;
            b.classList.toggle('tab-active', active);
            b.classList.toggle('tab-inactive', !active);
            b.setAttribute('aria-selected', active ? 'true' : 'false');
          });
          panels.forEach(function (p) {
            const show = p.getAttribute('data-tab-panel') === target;
            p.classList.toggle('hidden', !show);
          });
        });
      });
    })();
  </script>
</body>
</html>
