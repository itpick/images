<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nix-containers — Container Images</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{{BASE}}static/favicon/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="{{BASE}}static/favicon/favicon-16.png">
  <link rel="icon" type="image/x-icon" href="{{BASE}}static/favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="{{BASE}}static/favicon/apple-touch-icon.png">
  <link rel="stylesheet" href="{{BASE}}static/css/site.css">
  <script>window.SITE_BASE = "{{BASE}}";</script>
</head>
<body class="bg-bg-base text-fg-primary min-h-screen">
  <header class="border-b border-neutral-800 bg-bg-elevated">
    <div class="max-w-7xl mx-auto px-4 py-6">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-3xl font-bold font-mono text-accent-ok">nix-containers</h1>
          <p class="text-fg-muted mt-1">Secure, reproducible container images built with Nix</p>
        </div>
        <a href="https://github.com/nix-containers/images"
           class="text-fg-muted hover:text-fg-primary">GitHub →</a>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <div class="mb-6 grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="card">
        <div class="text-2xl font-bold font-mono text-accent-ok" id="total-images">–</div>
        <div class="text-sm text-fg-muted">Total images</div>
      </div>
      <div class="card">
        <div class="text-2xl font-bold font-mono" id="tested-images">–</div>
        <div class="text-sm text-fg-muted">With tests</div>
      </div>
      <div class="card">
        <div class="text-2xl font-bold font-mono" id="categories-count">–</div>
        <div class="text-sm text-fg-muted">Categories</div>
      </div>
      <div class="card">
        <div class="text-2xl font-bold font-mono text-accent-bad" id="critical-count">–</div>
        <div class="text-sm text-fg-muted">Critical CVEs</div>
      </div>
    </div>

    <div class="card mb-6">
      <div class="flex flex-col md:flex-row gap-3">
        <input type="text" id="search"
               placeholder="Search by name, description, or alias…"
               class="flex-1 bg-bg-input rounded px-3 py-2 text-fg-primary
                      placeholder-fg-muted focus:outline-none focus:ring-2
                      focus:ring-accent-ok">
        <select id="category-filter"
                class="bg-bg-input rounded px-3 py-2 text-fg-primary
                       focus:outline-none focus:ring-2 focus:ring-accent-ok">
          <option value="">All categories</option>
        </select>
        <label class="flex items-center gap-2 text-sm text-fg-primary cursor-pointer
                      bg-bg-input rounded px-3 py-2">
          <input type="checkbox" id="chart-filter" class="accent-accent-ok">
          <span>Used by a chart</span>
        </label>
      </div>
    </div>

    <div id="images-container"
         class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <div class="col-span-full text-center py-12 text-fg-muted">
        Loading images…
      </div>
    </div>
  </main>

  <script src="{{BASE}}static/app.js"></script>
</body>
</html>
