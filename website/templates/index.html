<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nix-containers — Container Images</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{{BASE}}static/favicon/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="{{BASE}}static/favicon/favicon-16.png">
  <link rel="icon" type="image/x-icon" href="{{BASE}}static/favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="{{BASE}}static/favicon/apple-touch-icon.png">
  <link rel="stylesheet" href="{{BASE}}static/css/site.css">
  <script>window.SITE_BASE = "{{BASE}}";</script>
</head>
<body class="bg-bg-base text-fg-primary min-h-screen">
  <header class="border-b border-neutral-800 bg-bg-elevated">
    <div class="max-w-7xl mx-auto px-4 py-6">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-3xl font-bold font-mono text-accent-ok">nix-containers</h1>
          <p class="text-fg-muted mt-1">Secure, reproducible container images built with Nix</p>
        </div>
        <nav class="flex items-center gap-4 text-sm">
          <a href="{{BASE}}charts/"
             class="text-fg-muted hover:text-fg-primary">Charts</a>
          <a href="{{BASE}}packages/"
             class="text-fg-muted hover:text-fg-primary">Packages</a>
          <a href="https://github.com/nix-containers/images"
           class="text-fg-muted hover:text-fg-primary inline-flex items-center"
           aria-label="View source on GitHub" title="View source on GitHub">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
          </svg>
        </a>
        </nav>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <div class="mb-6 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-7 gap-4">
      <div class="card">
        <div class="text-2xl font-bold font-mono text-accent-ok" id="total-images">–</div>
        <div class="text-sm text-fg-muted">Total images</div>
      </div>
      <div class="card">
        <div class="text-2xl font-bold font-mono" id="tested-images">–</div>
        <div class="text-sm text-fg-muted">With tests</div>
      </div>
      <div class="card">
        <div class="text-2xl font-bold font-mono" id="categories-count">–</div>
        <div class="text-sm text-fg-muted">Categories</div>
      </div>
      <div class="card">
        <div class="text-2xl font-bold font-mono text-accent-bad" id="critical-count">–</div>
        <div class="text-sm text-fg-muted">Critical CVEs</div>
      </div>
      <div class="card">
        <a href="{{BASE}}packages/" class="block hover:opacity-90">
          <div class="text-2xl font-bold font-mono text-accent-ok" id="total-packages">–</div>
          <div class="text-sm text-fg-muted">Packages</div>
          <div class="text-xs text-fg-muted mt-1" id="total-package-instances"></div>
        </a>
      </div>
      <div class="card">
        <a href="{{BASE}}charts/" class="block hover:opacity-90">
          <div class="text-2xl font-bold font-mono text-accent-ok" id="total-charts">–</div>
          <div class="text-sm text-fg-muted">Helm charts</div>
        </a>
      </div>
      <div class="card">
        <div class="text-2xl font-bold font-mono text-accent-ok" id="total-size">–</div>
        <div class="text-sm text-fg-muted">Total compressed</div>
        <div class="text-xs text-fg-muted mt-1" id="total-uncompressed"></div>
        <div class="text-xs text-fg-muted" id="upstream-comparison"></div>
      </div>
    </div>

    <div class="card mb-6">
      <div class="flex flex-col md:flex-row gap-3">
        <input type="text" id="search"
               placeholder="Search by name, description, or alias…"
               class="flex-1 bg-bg-input rounded px-3 py-2 text-fg-primary
                      placeholder-fg-muted focus:outline-none focus:ring-2
                      focus:ring-accent-ok">
        <select id="category-filter"
                class="bg-bg-input rounded px-3 py-2 text-fg-primary
                       focus:outline-none focus:ring-2 focus:ring-accent-ok">
          <option value="">All categories</option>
        </select>
        <label class="flex items-center gap-2 text-sm text-fg-primary cursor-pointer
                      bg-bg-input rounded px-3 py-2">
          <input type="checkbox" id="chart-filter" class="accent-accent-ok">
          <span>Used by a chart</span>
        </label>
      </div>
      <p id="results-count" class="text-xs text-fg-muted mt-3"></p>
    </div>

    <div id="images-container"
         class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <div class="col-span-full text-center py-12 text-fg-muted">
        Loading images…
      </div>
    </div>
  </main>

  <script src="{{BASE}}static/app.js"></script>
</body>
</html>
