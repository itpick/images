<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{NAME}} — nix-containers Helm chart</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{{BASE}}static/favicon/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="{{BASE}}static/favicon/favicon-16.png">
  <link rel="icon" type="image/x-icon" href="{{BASE}}static/favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="{{BASE}}static/favicon/apple-touch-icon.png">
  <link rel="stylesheet" href="{{BASE}}static/css/site.css">
</head>
<body class="bg-bg-base text-fg-primary min-h-screen">
  <header class="border-b border-neutral-800 bg-bg-elevated">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="{{BASE}}" class="font-mono text-lg font-bold text-accent-ok">
        nix-containers
      </a>
      <nav class="text-sm text-fg-muted space-x-4">
        <a href="{{BASE}}" class="hover:text-fg-primary">Images</a>
        <a href="{{BASE}}charts/" class="hover:text-fg-primary">All charts</a>
        <a href="{{BASE}}packages/" class="hover:text-fg-primary">Packages</a>
        <a href="{{SOURCE_URL}}"
           class="hover:text-fg-primary inline-flex items-center align-middle"
           aria-label="View source on GitHub" title="View source on GitHub">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

          </svg>
        </a>
      </nav>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold font-mono mb-2">{{NAME}}</h1>
    <p class="text-fg-muted text-sm mb-6">
      Helm chart · {{IMAGE_COUNT}} image reference<span class="opacity-0">s</span>
    </p>

    <section class="card mb-6">
      <h2 class="font-mono text-lg font-bold mb-3">Images used</h2>
      {{IMAGES_HTML}}
    </section>

    <section class="card mb-6">
      <h2 class="font-mono text-lg font-bold mb-3">README</h2>
      <div class="prose max-w-none">{{README_HTML}}</div>
    </section>
  </main>

</html>
