# nvchecker configuration for tracking upstream package versions
# Run: nix-shell -p nvchecker --run "nvchecker -c nvchecker.toml"
# Compare: nix-shell -p nvchecker --run "nvcmp -c nvchecker.toml"

[__config__]
oldver = "old_versions.json"
newver = "new_versions.json"

# ============================================
# Infrastructure & Orchestration
# ============================================

[act]
source = "github"
github = "nektos/act"
use_latest_release = true
prefix = "v"

[alertmanager]
source = "github"
github = "prometheus/alertmanager"
use_latest_release = true
prefix = "v"

