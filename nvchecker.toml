# nvchecker configuration for tracking upstream package versions
# Run: nix-shell -p nvchecker --run "nvchecker -c nvchecker.toml"
# Compare: nix-shell -p nvchecker --run "nvcmp -c nvchecker.toml"

[__config__]
oldver = "old_versions.json"
newver = "new_versions.json"

# ============================================
# Infrastructure & Orchestration
# ============================================

[act]
source = "github"
github = "nektos/act"
use_latest_release = true
prefix = "v"

[alertmanager]
source = "github"
github = "prometheus/alertmanager"
use_latest_release = true
prefix = "v"

[alloy]
source = "github"
github = "grafana/alloy"
use_latest_release = true
prefix = "v"

[apache-nifi]
source = "github"
github = "apache/nifi"
use_max_tag = true
prefix = "rel/nifi-"
include_regex = "^rel/nifi-\\d+\\.\\d+\\.\\d+$"
sort_version_key = "parse_version"

[argocd]
source = "github"
github = "argoproj/argo-cd"
use_latest_release = true
prefix = "v"

[argo-rollouts]
source = "github"
github = "argoproj/argo-rollouts"
use_latest_release = true
prefix = "v"

[argo-workflows]
